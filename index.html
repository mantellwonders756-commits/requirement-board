<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能需求看板与自动化周报系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --success: #10b981; --warning: #f59e0b; --danger: #f43f5e; }
        body { background: var(--bg); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #334155; }
        .navbar { background: white; border-bottom: 1px solid #edf2f7; padding: 0.8rem 0; position: sticky; top: 0; z-index: 1000; }
        
        .nav-tabs { border: none; }
        .nav-tabs .nav-link { border: none; color: #64748b; font-weight: 500; padding: 8px 20px; border-radius: 8px; transition: 0.3s; }
        .nav-tabs .nav-link.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2); }

        .card-custom { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 25px; background: white; margin-bottom: 20px; }
        
        .stat-card { border: none; border-radius: 16px; padding: 18px; color: white; cursor: pointer; transition: all 0.3s ease; height: 110px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); }
        .stat-card:hover { transform: translateY(-3px); opacity: 0.9; }
        .bg-indigo { background: linear-gradient(135deg, #6366f1, #4f46e5); }
        .bg-emerald { background: linear-gradient(135deg, #10b981, #059669); }
        .bg-amber { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .bg-rose { background: linear-gradient(135deg, #f43f5e, #e11d48); }

        .status-tag { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .tag-done { background: #ecfdf5; color: #059669; }
        .tag-doing { background: #eff6ff; color: #2563eb; }
        .tag-delay { background: #fff1f2; color: #e11d48; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
        .toast-msg { position: fixed; top: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 25px; border-radius: 8px; display: none; z-index: 3000; box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
        
        #weeklyReportPreview { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; white-space: pre-wrap; font-size: 14px; line-height: 1.8; color: #1e293b; max-height: 650px; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="toast" class="toast-msg"></div>

    <nav class="navbar">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="fw-bold fs-5 text-primary"><i class="bi bi-grid-1x2-fill me-2"></i>需求管理与周报系统</div>
            <ul class="nav nav-tabs" id="mainTabs">
                <li class="nav-item"><a class="nav-link active" id="tab-kanban" href="javascript:void(0)" onclick="switchTab('kanban')">需求看板</a></li>
                <li class="nav-item"><a class="nav-link" id="tab-report" href="javascript:void(0)" onclick="switchTab('report')">项目周报</a></li>
            </ul>
        </div>
    </nav>

    <div class="container py-4">
        <div id="kanbanView">
            <div class="row g-3 mb-4">
                <div class="col-md-3" onclick="setFilter('all')"><div class="stat-card bg-indigo"><h3><span id="statTotal">0</span></h3><div class="small opacity-75">总需求量</div></div></div>
                <div class="col-md-3" onclick="setFilter('ongoing')"><div class="stat-card bg-rose"><h3><span id="statDoing">0</span></h3><div class="small opacity-75">进行中/延期</div></div></div>
                <div class="col-md-3" onclick="setFilter('done')"><div class="stat-card bg-emerald"><h3><span id="statDone">0</span></h3><div class="small opacity-75">已完成数</div></div></div>
                <div class="col-md-3" onclick="setFilter('today')"><div class="stat-card bg-amber"><h3><span id="statToday">0</span></h3><div class="small opacity-75">今日到期</div></div></div>
            </div>

            <div class="card-custom">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary btn-sm px-3 rounded-pill" onclick="openAddModal()"><i class="bi bi-plus-lg me-1"></i>新增需求</button>
                        <button class="btn btn-outline-success btn-sm px-3 rounded-pill" onclick="exportToExcel()"><i class="bi bi-file-earmark-excel me-1"></i>导出</button>
                    </div>
                    <div class="position-relative w-25">
                        <i class="bi bi-search position-absolute" style="left:12px; top:7px; color:#94a3b8;"></i>
                        <input type="text" id="filterInput" class="form-control form-control-sm ps-5 rounded-pill" placeholder="搜索系统、描述..." oninput="applyAllFilters()">
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th width="60">序号</th><th width="120">系统</th><th>需求描述</th><th width="150">负责人</th><th width="100">状态</th><th width="120">计划时间</th><th width="120">操作</th>
                            </tr>
                        </thead>
                        <tbody id="reqTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="reportView" style="display: none;">
            <div class="row">
                <div class="col-md-8">
                    <div class="card-custom">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="fw-bold m-0 text-secondary">周报预览（基于当前数据实时生成）</h6>
                            <button class="btn btn-primary btn-sm rounded-pill px-3" onclick="copyReport()"><i class="bi bi-clipboard me-1"></i>复制全文</button>
                        </div>
                        <div id="weeklyReportPreview">正在加载...</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card-custom">
                        <h6 class="fw-bold mb-3">汇报参数</h6>
                        <div class="mb-3">
                            <label class="small text-muted">汇报周期</label>
                            <div class="d-flex gap-2 mt-1">
                                <input type="date" id="reportStart" class="form-control form-control-sm">
                                <input type="date" id="reportEnd" class="form-control form-control-sm">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="small text-muted">汇报标题</label>
                            <input type="text" id="reportTitle" class="form-control form-control-sm mt-1" value="相关系统需求进展周报">
                        </div>
                        <button class="btn btn-soft-primary btn-sm w-100 border" onclick="generateReport()">刷新预览内容</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="card p-4 shadow-lg border-0" style="width: 90%; max-width: 500px; border-radius: 20px;">
            <h5 id="modalTitle" class="fw-bold mb-4"><i class="bi bi-pencil-square me-2"></i>需求详情</h5>
            <input type="hidden" id="fieldId">
            <div class="mb-3"><label class="small fw-bold">所属系统</label><input type="text" id="fSystem" class="form-control" placeholder="如：资产系统"></div>
            <div class="mb-3"><label class="small fw-bold">需求描述</label><textarea id="fDesc" class="form-control" rows="3"></textarea></div>
            <div class="mb-3"><label class="small fw-bold">负责人邮箱</label><input type="email" id="fOwner" class="form-control"></div>
            <div class="row mb-3">
                <div class="col-6">
                    <label class="small fw-bold">计划完成时间</label>
                    <input type="date" id="fTime" class="form-control">
                </div>
                <div class="col-6">
                    <label class="small fw-bold">当前状态</label>
                    <select id="fStatus" class="form-select">
                        <option value="进行中">进行中</option>
                        <option value="已完成">已完成</option>
                        <option value="已取消">已取消</option>
                    </select>
                </div>
            </div>
            <div class="d-flex gap-2 justify-content-end mt-2">
                <button class="btn btn-light rounded-pill px-4" onclick="closeModal()">取消</button>
                <button class="btn btn-primary rounded-pill px-4" onclick="handleSave()">保存修改</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gcetwdskijgnegzvsxta.supabase.co';
        const SB_KEY = 'sb_publishable_4GJMrHSttX2bjshdvPIWNQ_xmMDl2mD';
        const client = supabase.createClient(SB_URL, SB_KEY);
        
        let dataStore = [];
        let currentStatusFilter = 'all';

        window.onload = () => { loadData(); initDates(); };

        async function loadData() {
            const { data, error } = await client.from('requirements').select('*').order('created_at', { ascending: false });
            if (!error) {
                dataStore = data;
                applyAllFilters();
                updateStats();
                if(document.getElementById('reportView').style.display === 'block') generateReport();
            }
        }

        function switchTab(tab) {
            document.getElementById('kanbanView').style.display = tab === 'kanban' ? 'block' : 'none';
            document.getElementById('reportView').style.display = tab === 'report' ? 'block' : 'none';
            document.getElementById('tab-kanban').classList.toggle('active', tab === 'kanban');
            document.getElementById('tab-report').classList.toggle('active', tab === 'report');
            if(tab === 'report') generateReport();
        }

        function applyAllFilters() {
            const keyword = document.getElementById('filterInput').value.toLowerCase();
            const now = new Date().setHours(0,0,0,0);

            const filtered = dataStore.filter(item => {
                const isDone = item.status === '已完成';
                const pDate = new Date(item.plan_time).setHours(0,0,0,0);
                const isDelay = !isDone && pDate < now;

                let passStat = true;
                if(currentStatusFilter === 'ongoing') passStat = !isDone;
                if(currentStatusFilter === 'done') passStat = isDone;
                if(currentStatusFilter === 'today') passStat = pDate === now && !isDone;

                return passStat && (item.description.toLowerCase().includes(keyword) || (item.system||'').toLowerCase().includes(keyword));
            });
            render(filtered);
        }

        function render(data) {
            const now = new Date().setHours(0,0,0,0);
            document.getElementById('reqTable').innerHTML = data.map((item, index) => {
                const pDate = new Date(item.plan_time).setHours(0,0,0,0);
                let statusClass = 'tag-doing';
                let displayStatus = item.status || '进行中';
                
                if(item.status === '已完成') statusClass = 'tag-done';
                else if(pDate < now) { statusClass = 'tag-delay'; displayStatus = '已延期'; }

                return `<tr>
                    <td class="text-muted small">${index+1}</td>
                    <td><span class="badge bg-light text-primary border">${item.system || '未归类'}</span></td>
                    <td class="text-truncate" style="max-width:300px" title="${item.description}">${item.description}</td>
                    <td class="small">${item.owner || '-'}</td>
                    <td><span class="status-tag ${statusClass}">${displayStatus}</span></td>
                    <td class="small">${item.plan_time || '-'}</td>
                    <td>
                        <button class="btn btn-sm text-primary p-0 me-2" onclick="openEdit(${item.id})">编辑</button>
                        <button class="btn btn-sm text-danger p-0" onclick="handleDel(${item.id})">删除</button>
                    </td>
                </tr>`;
            }).join('') || '<tr><td colspan="7" class="text-center py-5 text-muted">未发现匹配的需求</td></tr>';
        }

        function generateReport() {
            const start = document.getElementById('reportStart').value;
            const end = document.getElementById('reportEnd').value;
            const title = document.getElementById('reportTitle').value;
            const now = new Date().setHours(0,0,0,0);

            let groups = {};
            dataStore.forEach(i => {
                const sys = i.system || '其他系统';
                if(!groups[sys]) groups[sys] = { all: [], done: [], doing: [], delayed: [] };
                groups[sys].all.push(i);
                if(i.status === '已完成') groups[sys].done.push(i);
                else if(new Date(i.plan_time).setHours(0,0,0,0) < now) groups[sys].delayed.push(i);
                else groups[sys].doing.push(i);
            });

            let txt = `【${title}（${start} - ${end}）】\n\n大家好：\n\n本周继续同步系统需求整体进展。现将本周情况汇报如下：\n\n一、 各系统需求当前状态与进展\n\n`;
            
            Object.keys(groups).forEach((sys, idx) => {
                const g = groups[sys];
                txt += `${idx + 1}. ${sys}\n需求（${g.all.length}项）：`;
                if(g.done.length > 0) txt += `${g.done.length}项已完成；`;
                if(g.doing.length > 0) txt += `${g.doing.length}项进行中；`;
                if(g.delayed.length > 0) txt += `${g.delayed.length}项因资源/能力问题已延期；`;
                txt += `\n\n`;
            });

            txt += `二、 当前主要情况与风险\n\n`;
            const delays = dataStore.filter(i => i.status !== '已完成' && new Date(i.plan_time).setHours(0,0,0,0) < now);
            if(delays.length > 0) {
                txt += `1. 进度延迟：当前共有 ${delays.length} 项需求发生延期，主要涉及 ${[...new Set(delays.map(i=>i.system))].join('、')} 系统。\n`;
                txt += `2. 风险同步：部分工作项依赖资源协调，进展受阻，正在积极跟进中。\n\n`;
            } else {
                txt += `1. 整体进展：本周各系统需求按序推进，状态稳定。\n\n`;
            }

            txt += `三、 后续计划与协调事项\n\n1. 按既定计划推进剩余需求的实施与上线。\n2. 持续评估资源可用性对排期的影响。\n\n以上为本周工作进展，请各位审阅。\n\n谢谢！`;
            document.getElementById('weeklyReportPreview').innerText = txt;
        }

        function openEdit(id) {
            const i = dataStore.find(x => x.id === id);
            document.getElementById('fieldId').value = i.id;
            document.getElementById('fSystem').value = i.system || '';
            document.getElementById('fDesc').value = i.description;
            document.getElementById('fOwner').value = i.owner || '';
            document.getElementById('fTime').value = i.plan_time || '';
            document.getElementById('fStatus').value = i.status || '进行中';
            document.getElementById('editModal').style.display = 'flex';
        }

        async function handleSave() {
            const id = document.getElementById('fieldId').value;
            const payload = {
                system: document.getElementById('fSystem').value,
                description: document.getElementById('fDesc').value,
                owner: document.getElementById('fOwner').value,
                plan_time: document.getElementById('fTime').value,
                status: document.getElementById('fStatus').value
            };
            const { error } = id ? await client.from('requirements').update(payload).eq('id', id) : await client.from('requirements').insert([payload]);
            if(!error) { showToast("已保存修改"); closeModal(); loadData(); }
        }

        function updateStats() {
            const now = new Date().setHours(0,0,0,0);
            document.getElementById('statTotal').innerText = dataStore.length;
            document.getElementById('statDone').innerText = dataStore.filter(i => i.status === '已完成').length;
            document.getElementById('statDoing').innerText = dataStore.filter(i => i.status !== '已完成').length;
            document.getElementById('statToday').innerText = dataStore.filter(i => i.status !== '已完成' && new Date(i.plan_time).setHours(0,0,0,0) === now).length;
        }

        function initDates() {
            const now = new Date();
            const start = new Date(now.setDate(now.getDate() - (now.getDay() || 7) + 1)).toISOString().split('T')[0];
            const end = new Date(now.setDate(now.getDate() + 6)).toISOString().split('T')[0];
            document.getElementById('reportStart').value = start;
            document.getElementById('reportEnd').value = end;
        }

        function setFilter(f) { currentStatusFilter = f; applyAllFilters(); }
        function openAddModal() { 
            document.getElementById('fieldId').value = ''; 
            document.getElementById('fStatus').value = '进行中';
            document.getElementById('editModal').style.display = 'flex'; 
        }
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 2500); }
        async function handleDel(id) { if(confirm('确定删除该需求吗？')) { await client.from('requirements').delete().eq('id', id); loadData(); } }
        async function copyReport() { await navigator.clipboard.writeText(document.getElementById('weeklyReportPreview').innerText); showToast("已复制到剪贴板"); }
        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(dataStore);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "需求清单");
            XLSX.writeFile(wb, `需求清单_${new Date().toLocaleDateString()}.xlsx`);
        }
    </script>
</body>
</html>
