<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能需求管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { background: var(--bg); font-family: system-ui; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .stat-card { color: white; padding: 20px; border-radius: 12px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1050; }
        .toast-custom { position: fixed; top: 20px; right: 20px; z-index: 9999; background: #333; color: white; padding: 12px 24px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div id="toast" class="toast-custom"></div>

    <div class="container py-4">
        <h2 class="mb-4 fw-bold"><i class="bi bi-rocket-takeoff text-primary"></i> 需求管理看板</h2>

        <div class="card p-4 mb-4">
            <h5 class="mb-3"><i class="bi bi-robot"></i> 智能快录</h5>
            <textarea id="aiInput" class="form-control mb-3" rows="3" placeholder="输入：张三在4月10日前完成OA系统升级..."></textarea>
            <div class="d-flex gap-2">
                <button class="btn btn-primary" onclick="handleAIParse()"><i class="bi bi-magic"></i> AI 智能解析</button>
                <button class="btn btn-outline-secondary" onclick="addRequirement()">手动新增</button>
            </div>
        </div>

        <div class="card p-4">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>所属系统</th><th>描述</th><th>负责人</th><th>状态</th><th>计划时间</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="demandModal" class="modal-overlay">
        <div class="card p-4" style="width: 100%; max-width: 500px;">
            <h4 id="modalTitle" class="mb-3">新增需求</h4>
            <input type="hidden" id="editId">
            <div class="mb-3">
                <label class="form-label">所属系统</label>
                <input type="text" id="mSystem" class="form-control" placeholder="如：财务系统">
            </div>
            <div class="mb-3">
                <label class="form-label">需求描述</label>
                <textarea id="mDesc" class="form-control" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">负责人</label>
                <input type="text" id="mOwner" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">计划完成时间</label>
                <input type="datetime-local" id="mDate" class="form-control">
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-light" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="submitData()">确认保存</button>
            </div>
        </div>
    </div>

    <script>
        // 配置初始化 (只声明一次，防止重复定义报错)
        const S_URL = 'https://gcetwdskijgnegzvsxta.supabase.co';
        const S_KEY = 'sb_publishable_4GJMrHSttX2bjshdvPIWNQ_xmMDl2mD';
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        let allData = [];

        // 页面加载
        window.onload = () => {
            loadData();
        };

        async function loadData() {
            const { data, error } = await supabaseClient
                .from('requirements')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (!error) {
                allData = data;
                render();
            }
        }

        function render() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = allData.map(item => `
                <tr>
                    <td><span class="badge bg-light text-dark border">${item.system || '-'}</span></td>
                    <td>${item.description || '-'}</td>
                    <td><i class="bi bi-person"></i> ${item.owner || '-'}</td>
                    <td><span class="badge bg-info">${item.status || '进行中'}</span></td>
                    <td class="small text-muted">${item.plan_time ? new Date(item.plan_time).toLocaleString() : '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-link text-primary" onclick="editItem(${item.id})">编辑</button>
                        <button class="btn btn-sm btn-link text-danger" onclick="deleteItem(${item.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // AI 解析逻辑
        function handleAIParse() {
            const text = document.getElementById('aiInput').value;
            if(!text) return showToast("请输入内容");

            // 极简正则解析
            const ownerMatch = text.match(/(张三|李四|王五|赵六|陈七)/);
            const dateMatch = text.match(/(\d{1,2}月\d{1,2}日)/);
            
            addRequirement(); // 打开弹窗
            document.getElementById('mDesc').value = text;
            if(ownerMatch) document.getElementById('mOwner').value = ownerMatch[0];
            document.getElementById('mSystem').value = "待定系统";
            showToast("AI 解析完成，请完善细节");
        }

        async function submitData() {
            const id = document.getElementById('editId').value;
            const payload = {
                system: document.getElementById('mSystem').value,
                description: document.getElementById('mDesc').value,
                owner: document.getElementById('mOwner').value,
                plan_time: document.getElementById('mDate').value || new Date().toISOString(),
                status: '进行中'
            };

            let res;
            if (id) {
                res = await supabaseClient.from('requirements').update(payload).eq('id', id);
            } else {
                res = await supabaseClient.from('requirements').insert([payload]);
            }

            if (res.error) {
                showToast("操作失败：" + res.error.message);
            } else {
                showToast("保存成功！");
                closeModal();
                loadData();
            }
        }

        // 弹窗管理
        function addRequirement() {
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').innerText = "新增需求";
            document.getElementById('mSystem').value = '';
            document.getElementById('mDesc').value = '';
            document.getElementById('mOwner').value = '';
            document.getElementById('demandModal').style.display = 'flex';
        }

        function editItem(id) {
            const item = allData.find(d => d.id === id);
            document.getElementById('editId').value = item.id;
            document.getElementById('modalTitle').innerText = "编辑需求";
            document.getElementById('mSystem').value = item.system;
            document.getElementById('mDesc').value = item.description;
            document.getElementById('mOwner').value = item.owner;
            document.getElementById('demandModal').style.display = 'flex';
        }

        async function deleteItem(id) {
            if(!confirm("确定删除？")) return;
            await supabaseClient.from('requirements').delete().eq('id', id);
            loadData();
        }

        function closeModal() { document.getElementById('demandModal').style.display = 'none'; }
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
