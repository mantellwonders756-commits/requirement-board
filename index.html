<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能需求看板与提醒系统 - 旗舰优化版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #334155; }
        .navbar { background: white; border-bottom: 1px solid #edf2f7; padding: 1rem 0; }
        .quick-input-card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 25px; background: white; margin-top: 25px; }
        .ai-title { font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .ai-textarea { border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; font-size: 14px; background: #fcfcfc; }
        
        .stat-card { border: none; border-radius: 16px; padding: 20px; color: white; cursor: pointer; transition: all 0.3s ease; height: 120px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); position: relative; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .stat-card.active { outline: 3px solid #1e293b; outline-offset: 2px; }
        .stat-card h3 { font-size: 32px; font-weight: 700; margin-bottom: 0; }
        
        .bg-purple { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .bg-pink { background: linear-gradient(135deg, #f472b6, #db2777); }
        .bg-orange { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
        .bg-cyan { background: linear-gradient(135deg, #06b6d4, #22d3ee); }

        .table-card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 25px; background: white; margin-top: 25px; }
        .table thead th { background: #f8fafc; color: #64748b; font-weight: 600; font-size: 13px; border: none; padding: 15px; }
        .table tbody td { padding: 15px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        
        .status-tag { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; }
        .tag-ongoing { background: #ecfdf5; color: #10b981; }
        .tag-warning { background: #fff7ed; color: #ea580c; }
        .tag-delayed { background: #fff1f2; color: #f43f5e; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
        .toast-msg { position: fixed; top: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 25px; border-radius: 8px; display: none; z-index: 3000; }
        
        .search-box { position: relative; max-width: 300px; }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .search-box input { padding-left: 35px; border-radius: 20px; border: 1px solid #e2e8f0; font-size: 14px; }
        
        .btn-remind { color: #f59e0b; font-weight: 500; }
        .btn-remind:hover { color: #d97706; }
    </style>
</head>
<body>
    <div id="toast" class="toast-msg"></div>

    <nav class="navbar">
        <div class="container d-flex justify-content-between">
            <div class="fw-bold fs-5 text-primary"><i class="bi bi-intersect me-2"></i>智能需求看板与提醒系统</div>
            <div class="small text-muted">2026年 | 旗舰优化版</div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="quick-input-card">
            <div class="ai-title"><i class="bi bi-lightning-fill text-warning"></i>智能快速录入</div>
            <textarea id="aiInput" class="form-control ai-textarea" rows="2" placeholder="输入描述，例如：张三 4月20日 完成OA系统升级..."></textarea>
            <div class="d-flex gap-2 mt-3">
                <button class="btn btn-primary rounded-pill px-4" onclick="handleAIParse()"><i class="bi bi-robot me-2"></i>AI 解析</button>
            </div>
        </div>

        <div class="row g-4 mt-1">
            <div class="col-md-3" onclick="setFilter('today')">
                <div class="stat-card bg-purple" id="card-today">
                    <h3 id="statToday">0</h3>
                    <div class="label">今日到期</div>
                </div>
            </div>
            <div class="col-md-3" onclick="setFilter('ongoing')">
                <div class="stat-card bg-pink" id="card-ongoing">
                    <h3 id="statOngoing">0</h3>
                    <div class="label">进行中</div>
                </div>
            </div>
            <div class="col-md-3" onclick="setFilter('delayed')">
                <div class="stat-card bg-orange" id="card-delayed">
                    <h3 id="statOverdue">0</h3>
                    <div class="label">已延期</div>
                </div>
            </div>
            <div class="col-md-3" onclick="setFilter('all')">
                <div class="stat-card bg-cyan" id="card-all">
                    <h3 id="statTotal">0</h3>
                    <div class="label">总需求数</div>
                </div>
            </div>
        </div>

        <div class="table-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex gap-2">
                    <button class="btn btn-success btn-sm px-3" onclick="exportToExcel()">
                        <i class="bi bi-file-earmark-excel me-1"></i>导出 Excel
                    </button>
                    <button class="btn btn-primary btn-sm px-3" onclick="openAddModal()">
                        <i class="bi bi-plus-lg me-1"></i>新增需求
                    </button>
                </div>
                <div class="search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" id="filterInput" class="form-control" placeholder="筛选系统/描述/人/状态..." oninput="applyAllFilters()">
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>所属系统</th>
                            <th>需求描述</th>
                            <th>处理人邮箱</th>
                            <th>状态</th>
                            <th>提出时间</th>
                            <th>计划完成时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="reqTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="card p-4 shadow" style="width: 90%; max-width: 500px; border-radius: 20px; border:none;">
            <h5 id="modalTitle" class="fw-bold mb-4">编辑需求信息</h5>
            <input type="hidden" id="fieldId">
            <div class="mb-3"><label class="small fw-bold">所属系统</label><input type="text" id="fSystem" class="form-control"></div>
            <div class="mb-3"><label class="small fw-bold">需求描述</label><textarea id="fDesc" class="form-control" rows="3"></textarea></div>
            <div class="mb-3"><label class="small fw-bold">处理人邮箱</label><input type="email" id="fOwner" class="form-control"></div>
            <div class="mb-4"><label class="small fw-bold">计划完成时间</label><input type="datetime-local" id="fTime" class="form-control"></div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-light px-4" onclick="closeModal()">取消</button>
                <button class="btn btn-primary px-4" onclick="handleSave()">确认保存</button>
            </div>
        </div>
    </div>

    <div id="remindModal" class="modal-overlay">
        <div class="card p-4 shadow" style="width: 90%; max-width: 450px; border-radius: 20px; border:none;">
            <h5 class="fw-bold mb-3"><i class="bi bi-envelope-at me-2 text-warning"></i>发送邮件提醒</h5>
            <div class="p-3 bg-light rounded-3 mb-3">
                <p class="small text-muted mb-1">发送至：</p>
                <div id="remindTo" class="fw-bold mb-2"></div>
                <p class="small text-muted mb-1">邮件内容概览：</p>
                <div id="remindContent" class="small" style="color:#64748b; border-left: 3px solid #e2e8f0; padding-left: 10px;"></div>
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-light px-4" onclick="closeRemindModal()">取消</button>
                <button class="btn btn-warning px-4 text-white" onclick="confirmSendEmail()"><i class="bi bi-send-fill me-1"></i>立即发送</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gcetwdskijgnegzvsxta.supabase.co';
        const SB_KEY = 'sb_publishable_4GJMrHSttX2bjshdvPIWNQ_xmMDl2mD';
        const client = supabase.createClient(SB_URL, SB_KEY);
        
        let dataStore = []; 
        let currentStatusFilter = 'all'; 

        window.onload = loadData;

        async function loadData() {
            const { data, error } = await client.from('requirements').select('*').order('created_at', { ascending: false });
            if (!error) { 
                dataStore = data; 
                applyAllFilters(); 
                updateStats(); 
            }
        }

        function setFilter(status) {
            currentStatusFilter = status;
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${status}`).classList.add('active');
            applyAllFilters();
        }

        function applyAllFilters() {
            const searchKeyword = document.getElementById('filterInput').value.toLowerCase();
            const now = new Date();

            const filtered = dataStore.filter(item => {
                const planDate = new Date(item.plan_time);
                const isOverdue = planDate < now;
                const isToday = planDate.toDateString() === now.toDateString();
                
                let passStatus = true;
                if (currentStatusFilter === 'today') passStatus = isToday;
                else if (currentStatusFilter === 'ongoing') passStatus = !isOverdue;
                else if (currentStatusFilter === 'delayed') passStatus = isOverdue;

                const statusText = isOverdue ? '已延期' : '进行中';
                const passSearch = [
                    item.system, 
                    item.description, 
                    item.owner, 
                    statusText, 
                    new Date(item.plan_time).toLocaleDateString()
                ].some(val => String(val).toLowerCase().includes(searchKeyword));

                return passStatus && passSearch;
            });

            render(filtered);
        }

        function render(data) {
            const html = data.map((item, index) => {
                const now = new Date();
                const planDate = new Date(item.plan_time);
                const isOverdue = planDate < now;
                const tagClass = isOverdue ? 'tag-delayed' : 'tag-ongoing';

                return `<tr>
                    <td class="text-muted small">${index + 1}</td>
                    <td><span class="badge bg-light text-primary border px-2 py-1">${item.system || '通用'}</span></td>
                    <td class="text-truncate" style="max-width:180px" title="${item.description}">${item.description}</td>
                    <td class="small">${item.owner || '-'}</td>
                    <td><span class="status-tag ${tagClass}">● ${isOverdue ? '已延期' : '进行中'}</span></td>
                    <td class="text-muted small">${new Date(item.created_at).toLocaleDateString()}</td>
                    <td class="small fw-bold">${new Date(item.plan_time).toLocaleString()}</td>
                    <td>
                        <button class="btn btn-sm text-primary p-0 me-2" onclick="openEdit(${item.id})">编辑</button>
                        <button class="btn btn-sm btn-remind p-0 me-2" onclick="openRemind(${item.id})">提醒</button>
                        <button class="btn btn-sm text-danger p-0" onclick="handleDel(${item.id})">删除</button>
                    </td>
                </tr>`;
            }).join('');
            document.getElementById('reqTable').innerHTML = html || '<tr><td colspan="8" class="text-center py-5">暂无符合条件的需求</td></tr>';
        }

        // 邮件提醒逻辑
        function openRemind(id) {
            const item = dataStore.find(i => i.id === id);
            if(!item.owner || !item.owner.includes('@')) {
                showToast("未找到有效邮箱地址，请先编辑处理人信息");
                return;
            }
            document.getElementById('remindTo').innerText = item.owner;
            document.getElementById('remindContent').innerText = `【需求提醒】您有一个负责的需求待处理：${item.description}。计划截止时间为：${new Date(item.plan_time).toLocaleString()}，请关注。`;
            document.getElementById('remindModal').style.display = 'flex';
        }

        function closeRemindModal() { document.getElementById('remindModal').style.display = 'none'; }

        function confirmSendEmail() {
            // 此处通常对接后端 API 或 SendGrid 等服务
            showToast("正在通过系统向 " + document.getElementById('remindTo').innerText + " 发送提醒...");
            setTimeout(() => {
                showToast("邮件已成功发送！");
                closeRemindModal();
            }, 1500);
        }

        // 导出 Excel
        function exportToExcel() {
            const worksheet = XLSX.utils.json_to_sheet(dataStore.map(i => ({
                "所属系统": i.system,
                "需求描述": i.description,
                "处理人邮箱": i.owner,
                "提出时间": new Date(i.created_at).toLocaleString(),
                "计划完成时间": new Date(i.plan_time).toLocaleString()
            })));
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "需求看板");
            XLSX.writeFile(workbook, `需求导出_${new Date().getTime()}.xlsx`);
            showToast("Excel 文件已生成并下载");
        }

        // 基础 CRUD 操作
        async function handleSave() {
            const id = document.getElementById('fieldId').value;
            const payload = {
                system: document.getElementById('fSystem').value,
                description: document.getElementById('fDesc').value,
                owner: document.getElementById('fOwner').value,
                plan_time: document.getElementById('fTime').value
            };
            const { error } = id ? await client.from('requirements').update(payload).eq('id', id) : await client.from('requirements').insert([payload]);
            if(!error) { showToast("保存成功"); closeModal(); loadData(); }
        }

        async function handleDel(id) {
            if(confirm('确定要删除吗？')) {
                const { error } = await client.from('requirements').delete().eq('id', id);
                if(!error) { showToast("已删除"); loadData(); }
            }
        }

        function updateStats() {
            const now = new Date();
            document.getElementById('statTotal').innerText = dataStore.length;
            document.getElementById('statOngoing').innerText = dataStore.filter(i => new Date(i.plan_time) >= now).length;
            document.getElementById('statOverdue').innerText = dataStore.filter(i => new Date(i.plan_time) < now).length;
            document.getElementById('statToday').innerText = dataStore.filter(i => new Date(i.plan_time).toDateString() === now.toDateString()).length;
        }

        function openEdit(id) {
            const item = dataStore.find(i => i.id === id);
            document.getElementById('fieldId').value = item.id;
            document.getElementById('fSystem').value = item.system || '';
            document.getElementById('fDesc').value = item.description;
            document.getElementById('fOwner').value = item.owner || '';
            if(item.plan_time) document.getElementById('fTime').value = new Date(item.plan_time).toISOString().slice(0,16);
            document.getElementById('editModal').style.display = 'flex';
        }

        function openAddModal() {
            document.getElementById('fieldId').value = '';
            document.getElementById('fSystem').value = ''; document.getElementById('fDesc').value = '';
            document.getElementById('fOwner').value = ''; document.getElementById('fTime').value = '';
            document.getElementById('editModal').style.display = 'flex';
        }

        function handleAIParse() { showToast("AI 解析服务配置中..."); }
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); }
    </script>
</body>
</html>
