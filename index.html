<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求看板 Pro - 完整功能还原最终版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* 核心样式还原 */
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #1e293b; }
        
        .navbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 16px 0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
        .nav-link { color: #64748b; font-weight: 500; cursor: pointer; padding: 10px 24px; border-radius: 10px; transition: all 0.3s; margin-left: 8px; }
        .nav-link.active { background: #6366f1; color: white !important; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25); }

        /* 纯色大色块统计区还原自 image_b3271e.png */
        .stat-card { border: none; border-radius: 16px; padding: 28px; color: white; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; height: 140px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
        .stat-card i { position: absolute; right: 20px; bottom: 20px; font-size: 40px; opacity: 0.15; }
        
        .bg-total { background-color: #3b5998; }   /* 深蓝色 */
        .bg-doing { background-color: #f59e0b; }   /* 暖黄色 */
        .bg-delay { background-color: #dc2626; }   /* 砖红色 */
        .bg-week { background-color: #0d9488; }    /* 深青色 */

        .card-custom { border: none; border-radius: 18px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); padding: 25px; background: white; margin-bottom: 24px; }
        
        /* 列表字段与状态样式 */
        .table thead th { background: #f1f5f9; color: #475569; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.025em; border: none; }
        .status-tag { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; display: inline-block; }
        .tag-doing { background: #fef3c7; color: #92400e; }
        .tag-done { background: #d1fae5; color: #065f46; }
        .tag-delay { background: #fee2e2; color: #991b1b; }

        /* AI 输入区细节 */
        #aiInput { border: 2px solid #f1f5f9; border-radius: 14px; padding: 18px; width: 100%; min-height: 110px; outline: none; transition: 0.3s; background: #f8fafc; font-size: 14px; }
        #aiInput:focus { border-color: #6366f1; background: white; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        /* 周报内容预览还原自 image_b31c1c.png */
        #reportArea { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 40px; white-space: pre-wrap; font-size: 15px; line-height: 2; color: #334155; min-height: 600px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        
        /* 弹窗样式 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
        .cursor-pointer { cursor: pointer; }
    </style>
</head>
<body>
    <nav class="navbar mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="fw-bold fs-4 text-primary d-flex align-items-center"><i class="bi bi-rocket-takeoff-fill me-2"></i>需求看板 Pro</div>
            <div class="d-flex">
                <div class="nav-link active" id="tab-k" onclick="switchTab('k')">需求看板</div>
                <div class="nav-link" id="tab-r" onclick="switchTab('r')">项目周报</div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="view-k">
            <div class="card-custom mb-4">
                <div class="d-flex align-items-center mb-3">
                    <i class="bi bi-lightning-charge-fill text-warning fs-4 me-2"></i>
                    <h6 class="fw-bold m-0">智能快速录入</h6>
                </div>
                <textarea id="aiInput" placeholder="输入自然语言描述，系统将自动解析。例如：资产系统下周五前由张三完成导出功能功能。"></textarea>
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <span class="small text-muted">支持格式：[系统名] + [日期] + [负责人] + [需求描述]</span>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-secondary btn-sm px-4 rounded-pill" onclick="document.getElementById('aiInput').value=''">清空</button>
                        <button class="btn btn-primary btn-sm px-4 rounded-pill" id="aiBtn" onclick="handleAIParse()">AI 智能解析</button>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-3" onclick="setFilter('all')">
                    <div class="stat-card bg-total">
                        <h2 class="fw-bold m-0" id="s-total">0</h2>
                        <div class="d-flex justify-content-between"><span>全部需求</span><i class="bi bi-list-task"></i></div>
                    </div>
                </div>
                <div class="col-md-3" onclick="setFilter('doing')">
                    <div class="stat-card bg-doing">
                        <h2 class="fw-bold m-0" id="s-doing">0</h2>
                        <div class="d-flex justify-content-between"><span>进行中</span><i class="bi bi-gear-wide-connected"></i></div>
                    </div>
                </div>
                <div class="col-md-3" onclick="setFilter('delay')">
                    <div class="stat-card bg-delay">
                        <h2 class="fw-bold m-0" id="s-delay">0</h2>
                        <div class="d-flex justify-content-between"><span>已延期</span><i class="bi bi-exclamation-triangle"></i></div>
                    </div>
                </div>
                <div class="col-md-3" onclick="setFilter('week')">
                    <div class="stat-card bg-week">
                        <h2 class="fw-bold m-0" id="s-week">0</h2>
                        <div class="d-flex justify-content-between"><span>本周待办</span><i class="bi bi-calendar-check"></i></div>
                    </div>
                </div>
            </div>

            <div class="card-custom">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary btn-sm px-3 rounded-pill" onclick="openModal()"><i class="bi bi-plus-lg"></i> 新增需求</button>
                        <button class="btn btn-outline-success btn-sm px-3 rounded-pill" onclick="exportData()"><i class="bi bi-file-earmark-excel"></i> 导出表格</button>
                    </div>
                    <div class="input-group input-group-sm w-25">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchInp" class="form-control border-start-0 ps-0" placeholder="搜索系统、负责人..." oninput="refreshUI()">
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th width="50">#</th>
                                <th width="110">提出时间</th> <th width="120">系统</th>
                                <th>需求描述</th>
                                <th width="100">负责人</th>
                                <th width="100">状态</th>
                                <th width="150">计划完成时间</th> <th width="100">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-r" style="display: none;">
            <div class="row">
                <div class="col-md-8">
                    <div class="card-custom">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h6 class="fw-bold m-0 text-secondary">本周进度报告预览</h6>
                            <button class="btn btn-primary btn-sm px-4 rounded-pill" onclick="copyReport()">一键复制文字</button>
                        </div>
                        <div id="reportArea">数据加载中...</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card-custom">
                        <h6 class="fw-bold mb-4">报告周期设置</h6>
                        <div class="mb-3">
                            <label class="small fw-bold mb-2">开始日期</label>
                            <input type="date" id="date-s" class="form-control rounded-3">
                        </div>
                        <div class="mb-4">
                            <label class="small fw-bold mb-2">结束日期</label>
                            <input type="date" id="date-e" class="form-control rounded-3">
                        </div>
                        <button class="btn btn-primary w-100 py-2 rounded-pill" onclick="generateReport()">重新生成刷新周报</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="card p-4 shadow-lg border-0" style="width: 550px; border-radius: 24px;">
            <h5 class="fw-bold mb-4" id="modalTitle">编辑需求详情</h5>
            <input type="hidden" id="f-id">
            <div class="mb-3">
                <label class="small fw-bold text-muted mb-1">提出时间 (Created At)</label>
                <input type="date" id="f-created" class="form-control bg-light" readonly> </div>
            <div class="mb-3">
                <label class="small fw-bold mb-1">所属系统</label>
                <input type="text" id="f-sys" class="form-control" placeholder="输入系统名称">
            </div>
            <div class="mb-3">
                <label class="small fw-bold mb-1">需求详情描述</label>
                <textarea id="f-desc" class="form-control" rows="4" placeholder="请详细描述具体工作内容"></textarea>
            </div>
            <div class="row mb-3">
                <div class="col-6">
                    <label class="small fw-bold mb-1">负责人</label>
                    <input type="text" id="f-owner" class="form-control">
                </div>
                <div class="col-6">
                    <label class="small fw-bold mb-1">计划完成时间</label>
                    <input type="date" id="f-plan" class="form-control">
                </div>
            </div>
            <div class="mb-4">
                <label class="small fw-bold mb-1">当前状态</label>
                <select id="f-stat" class="form-select">
                    <option value="进行中">进行中</option>
                    <option value="已完成">已完成</option>
                </select>
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-light px-4 rounded-pill" onclick="closeModal()">取消</button>
                <button class="btn btn-primary px-4 rounded-pill" onclick="saveToDB()">确认提交</button>
            </div>
        </div>
    </div>

    <script>
        // 核心配置
        const SB_URL = 'https://gcetwdskijgnegzvsxta.supabase.co';
        const SB_KEY = 'sb_publishable_4GJMrHSttX2bjshdvPIWNQ_xmMDl2mD';
        const client = supabase.createClient(SB_URL, SB_KEY);
        
        let allItems = [];
        let filterMode = 'all';

        // 初始化加载
        window.onload = () => { initDates(); loadData(); };

        // 找回日期初始化逻辑
        function initDates() {
            const today = new Date();
            const dayNum = today.getDay() || 7;
            const monday = new Date(today.setDate(today.getDate() - dayNum + 1)).toISOString().split('T')[0];
            const sunday = new Date(today.setDate(today.getDate() + 6)).toISOString().split('T')[0];
            document.getElementById('date-s').value = monday;
            document.getElementById('date-e').value = sunday;
        }

        async function loadData() {
            const { data, error } = await client.from('requirements').select('*').order('created_at', { ascending: false });
            if (!error) {
                allItems = data;
                refreshUI();
                updateStats();
            }
        }

        function fmtD(str) { return str ? str.split('T')[0] : '-'; }

        function refreshUI() {
            const kw = document.getElementById('searchInp').value.toLowerCase();
            const today = new Date().setHours(0,0,0,0);

            const filtered = allItems.filter(i => {
                const pTime = i.plan_time ? new Date(i.plan_time).getTime() : 0;
                const isDelayed = i.status !== '已完成' && pTime && pTime < today;
                
                let matchType = true;
                if(filterMode === 'doing') matchType = (i.status === '进行中');
                if(filterMode === 'delay') matchType = isDelayed;
                if(filterMode === 'week') {
                    const weekEnd = new Date(new Date().setDate(new Date().getDate() + 7)).getTime();
                    matchType = i.status !== '已完成' && pTime && pTime <= weekEnd;
                }
                const matchKw = (i.description||'').toLowerCase().includes(kw) || (i.system||'').toLowerCase().includes(kw);
                return matchType && matchKw;
            });

            document.getElementById('tableBody').innerHTML = filtered.map((i, idx) => {
                const isDelayed = i.status !== '已完成' && i.plan_time && new Date(i.plan_time) < today;
                return `<tr>
                    <td><span class="text-muted small">${idx+1}</span></td>
                    <td class="text-muted small">${fmtD(i.created_at)}</td>
                    <td><span class="badge bg-light text-primary border">${i.system || '未归类'}</span></td>
                    <td class="text-truncate" style="max-width:350px">${i.description}</td>
                    <td>${i.owner || '-'}</td>
                    <td><span class="status-tag ${i.status==='已完成'?'tag-done':(isDelayed?'tag-delay':'tag-doing')}">${isDelayed?'已延期':i.status}</span></td>
                    <td class="fw-bold ${isDelayed?'text-danger':''}">${fmtD(i.plan_time)}</td>
                    <td>
                        <button class="btn btn-sm text-primary p-0 me-2" onclick="editItem(${i.id})">编辑</button>
                        <button class="btn btn-sm text-danger p-0" onclick="deleteItem(${i.id})">删除</button>
                    </td>
                </tr>`;
            }).join('') || '<tr><td colspan="8" class="text-center py-5 text-muted">暂无符合条件的数据</td></tr>';
        }

        // 找回周报构造逻辑
        function generateReport() {
            const start = document.getElementById('date-s').value;
            const end = document.getElementById('date-e').value;
            const now = new Date().setHours(0,0,0,0);
            
            let groups = {};
            allItems.forEach(i => { const s = i.system || '其他系统'; if(!groups[s]) groups[s] = []; groups[s].push(i); });

            let doc = `【项目周报】 周期：${start} ~ ${end}\n\n`;
            doc += `一、整体进度概览\n目前共有需求 ${allItems.length} 项，本周已完成 ${allItems.filter(i=>i.status==='已完成').length} 项，${allItems.filter(i=>i.status==='进行中').length} 项正在推进中。\n\n`;
            
            doc += `二、系统明细清单\n`;
            Object.keys(groups).forEach((sys, idx) => {
                doc += `${idx+1}. ${sys}模块：\n`;
                groups[sys].forEach(item => {
                    doc += `   - [${item.status}] ${item.description} (负责人：${item.owner || '待定'})\n`;
                });
            });

            const delays = allItems.filter(i => i.status !== '已完成' && i.plan_time && new Date(i.plan_time) < now);
            doc += `\n三、异常与风险预警\n`;
            if(delays.length > 0) {
                doc += `检测到 ${delays.length} 项存在延期风险，请及时跟进：\n`;
                delays.forEach(d => doc += `   - 延期任务：${d.description} (计划完成：${fmtD(d.plan_time)})\n`);
            } else {
                doc += `当前所有项目均按计划推进，暂无进度预警。`;
            }
            document.getElementById('reportArea').innerText = doc;
        }

        // 找回 AI 解析处理
        async function handleAIParse() {
            const text = document.getElementById('aiInput').value;
            if(!text) return alert("请先输入需求描述文字");
            const btn = document.getElementById('aiBtn');
            btn.innerText = '正在智能深度解析...'; btn.disabled = true;
            try {
                const { data, error } = await client.functions.invoke('parse-requirement', { body: { text } });
                if(error) throw error;
                openModal();
                if(data.system) document.getElementById('f-sys').value = data.system;
                if(data.description) document.getElementById('f-desc').value = data.description;
                if(data.owner) document.getElementById('f-owner').value = data.owner;
                if(data.plan_time) document.getElementById('f-plan').value = data.plan_time.split('T')[0];
            } catch (e) { 
                alert("AI 解析遇到问题：跨域策略限制或网络故障。请确保在 http:// 环境下运行或手动输入。"); 
            } finally { 
                btn.innerText = 'AI 智能解析'; btn.disabled = false; 
            }
        }

        function updateStats() {
            const today = new Date().setHours(0,0,0,0);
            document.getElementById('s-total').innerText = allItems.length;
            document.getElementById('s-doing').innerText = allItems.filter(i => i.status === '进行中').length;
            document.getElementById('s-delay').innerText = allItems.filter(i => i.status !== '已完成' && i.plan_time && new Date(i.plan_time) < today).length;
            const weekEnd = new Date(new Date().setDate(new Date().getDate() + 7)).getTime();
            document.getElementById('s-week').innerText = allItems.filter(i => i.status !== '已完成' && i.plan_time && new Date(i.plan_time).getTime() <= weekEnd).length;
        }

        function switchTab(t) {
            document.getElementById('view-k').style.display = t==='k'?'block':'none';
            document.getElementById('view-r').style.display = t==='r'?'block':'none';
            document.getElementById('tab-k').classList.toggle('active', t==='k');
            document.getElementById('tab-r').classList.toggle('active', t==='r');
            if(t==='r') generateReport();
        }

        function openModal() {
            document.getElementById('f-id').value = '';
            document.getElementById('modalTitle').innerText = '新增需求事项';
            document.getElementById('f-created').value = new Date().toISOString().split('T')[0];
            document.getElementById('f-sys').value = ''; document.getElementById('f-desc').value = '';
            document.getElementById('f-owner').value = ''; document.getElementById('f-plan').value = '';
            document.getElementById('f-stat').value = '进行中';
            document.getElementById('modal').style.display = 'flex';
        }

        function editItem(id) {
            const i = allItems.find(x => x.id === id);
            document.getElementById('f-id').value = i.id;
            document.getElementById('modalTitle').innerText = '编辑需求详情';
            document.getElementById('f-created').value = fmtD(i.created_at);
            document.getElementById('f-sys').value = i.system || '';
            document.getElementById('f-desc').value = i.description || '';
            document.getElementById('f-owner').value = i.owner || '';
            document.getElementById('f-plan').value = fmtD(i.plan_time);
            document.getElementById('f-stat').value = i.status || '进行中';
            document.getElementById('modal').style.display = 'flex';
        }

        async function saveToDB() {
            const id = document.getElementById('f-id').value;
            const obj = { 
                system: document.getElementById('f-sys').value, 
                description: document.getElementById('f-desc').value, 
                owner: document.getElementById('f-owner').value, 
                plan_time: document.getElementById('f-plan').value || null, 
                status: document.getElementById('f-stat').value 
            };
            const { error } = id ? await client.from('requirements').update(obj).eq('id', id) : await client.from('requirements').insert([obj]);
            if(!error) { closeModal(); loadData(); }
        }

        function setFilter(f) { filterMode = f; refreshUI(); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        async function deleteItem(id) { if(confirm('数据删除后无法恢复，确定删除吗？')) { await client.from('requirements').delete().eq('id', id); loadData(); } }
        async function copyReport() { await navigator.clipboard.writeText(document.getElementById('reportArea').innerText); alert("文字内容已复制"); }
        
        // 找回导出逻辑
        function exportData() {
            const data = allItems.map(i => ({ "提出时间": fmtD(i.created_at), "系统": i.system, "需求描述": i.description, "负责人": i.owner, "状态": i.status, "计划完成时间": fmtD(i.plan_time) }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "需求清单");
            XLSX.writeFile(wb, `项目需求管理表_${new Date().toLocaleDateString()}.xlsx`);
        }
    </script>
</body>
</html>
