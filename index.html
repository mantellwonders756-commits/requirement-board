<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求看板 Pro - 完整功能版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #4e73df; --bg: #f8f9fc; --success: #1cc88a; --info: #36b9cc; --warning: #f6c23e; --danger: #e74a3b; }
        body { background: var(--bg); font-family: 'Nunito', 'PingFang SC', sans-serif; color: #5a5c69; }
        .navbar { background: white; box-shadow: 0 0.15rem 1.75rem rgba(58, 59, 69, 0.1); }
        .nav-link { cursor: pointer; border-radius: 5px; margin: 0 5px; transition: 0.2s; }
        .nav-link.active { background: var(--primary); color: white !important; }
        
        .stat-card { border: none; border-radius: 12px; padding: 24px; color: white; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; height: 110px; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .stat-card i { position: absolute; right: 10px; bottom: 10px; font-size: 3rem; opacity: 0.2; }
        
        .bg-total { background: linear-gradient(135deg, #4e73df, #224abe); }
        .bg-ongoing { background: linear-gradient(135deg, #f6c23e, #dda20a); }
        .bg-delayed { background: linear-gradient(135deg, #e74a3b, #be2617); }
        .bg-today { background: linear-gradient(135deg, #36b9cc, #258391); }

        .card-custom { border: none; border-radius: 15px; box-shadow: 0 0.15rem 1.75rem rgba(58, 59, 69, 0.1); background: white; padding: 25px; margin-bottom: 24px; }
        .table thead th { background: #f8f9fc; border-top: none; color: #4e73df; text-transform: uppercase; font-size: 0.8rem; font-weight: 700; }
        
        .status-badge { padding: 5px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; }
        .status-doing { background: #fff4e5; color: #b45309; }
        .status-done { background: #ecfdf5; color: #065f46; }
        .status-delay { background: #fef2f2; color: #991b1b; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1050; backdrop-filter: blur(4px); }
        .toast-msg { position: fixed; top: 20px; right: 20px; background: #333; color: white; padding: 12px 24px; border-radius: 8px; z-index: 2000; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        #aiInputArea { border: 2px dashed #d1d3e2; border-radius: 10px; padding: 15px; background: #fff; transition: 0.3s; }
        #aiInputArea:focus-within { border-color: var(--primary); background: #fdfdff; }
        #aiInput { border: none; width: 100%; outline: none; resize: none; min-height: 60px; font-size: 14px; }

        #weeklyReportPreview { background: #f8f9fc; border: 1px solid #e3e6f0; border-radius: 8px; padding: 20px; white-space: pre-wrap; font-family: monospace; line-height: 1.6; max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="toast" class="toast-msg"></div>

<nav class="navbar navbar-expand navbar-light mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#"><i class="bi bi-rocket-takeoff-fill me-2"></i>需求看板 Pro</a>
        <div class="navbar-nav">
            <a class="nav-link active" id="nav-kanban" onclick="switchTab('kanban')">需求看板</a>
            <a class="nav-link" id="nav-report" onclick="switchTab('report')">项目周报</a>
        </div>
    </div>
</nav>

<div class="container">
    <div id="view-kanban">
        <div class="card-custom">
            <div class="d-flex align-items-center mb-2">
                <i class="bi bi-lightning-fill text-warning me-2"></i>
                <span class="fw-bold">智能快速录入</span>
            </div>
            <div id="aiInputArea">
                <textarea id="aiInput" placeholder="请输入：负责人 + 计划时间 + 事项描述。例如：下周五前张三完成资产系统导出功能"></textarea>
                <div class="d-flex justify-content-end gap-2 mt-2">
                    <button class="btn btn-sm btn-light border" onclick="document.getElementById('aiInput').value=''">清空</button>
                    <button class="btn btn-sm btn-primary px-3" id="aiBtn" onclick="handleAIParse()">AI 解析</button>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-3" onclick="setFilter('all')">
                <div class="stat-card bg-total">
                    <div class="h3 fw-bold mb-0" id="statTotal">0</div>
                    <div class="small">总需求</div>
                    <i class="bi bi-list-task"></i>
                </div>
            </div>
            <div class="col-md-3" onclick="setFilter('ongoing')">
                <div class="stat-card bg-ongoing">
                    <div class="h3 fw-bold mb-0" id="statDoing">0</div>
                    <div class="small">进行中</div>
                    <i class="bi bi-play-circle"></i>
                </div>
            </div>
            <div class="col-md-3" onclick="setFilter('delayed')">
                <div class="stat-card bg-delayed">
                    <div class="h3 fw-bold mb-0" id="statDelay">0</div>
                    <div class="small">已延期</div>
                    <i class="bi bi-exclamation-triangle"></i>
                </div>
            </div>
            <div class="col-md-3" onclick="setFilter('today')">
                <div class="stat-card bg-today">
                    <div class="h3 fw-bold mb-0" id="statToday">0</div>
                    <div class="small">本周待办</div>
                    <i class="bi bi-calendar-check"></i>
                </div>
            </div>
        </div>

        <div class="card-custom">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex gap-2">
                    <button class="btn btn-primary btn-sm rounded-pill px-3" onclick="openModal()"><i class="bi bi-plus-lg me-1"></i>新增需求</button>
                    <button class="btn btn-outline-success btn-sm rounded-pill px-3" onclick="exportToExcel()"><i class="bi bi-file-earmark-excel me-1"></i>导出</button>
                </div>
                <div class="w-25 position-relative">
                    <i class="bi bi-search position-absolute" style="left:10px; top:8px; opacity:0.5;"></i>
                    <input type="text" id="searchInput" class="form-control form-control-sm ps-5 rounded-pill" placeholder="搜索关键字..." oninput="currentPage=1;applyFilters()">
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>系统</th>
                            <th>需求描述</th>
                            <th>负责人</th>
                            <th>状态</th>
                            <th>计划完成时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable"></tbody>
                </table>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-3">
                <div class="small text-muted">共 <span id="totalNum">0</span> 条，第 <span id="pageNum">1/1</span> 页</div>
                <div class="btn-group">
                    <button class="btn btn-sm btn-outline-secondary" onclick="changePage(-1)"><i class="bi bi-chevron-left"></i></button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="changePage(1)"><i class="bi bi-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="view-report" style="display:none;">
        <div class="row">
            <div class="col-md-8">
                <div class="card-custom">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold m-0">周报预览</h6>
                        <button class="btn btn-sm btn-primary" onclick="copyReport()">复制文字</button>
                    </div>
                    <div id="weeklyReportPreview">正在生成...</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-custom">
                    <h6 class="fw-bold mb-3">周报设置</h6>
                    <div class="mb-3">
                        <label class="small text-muted mb-1">开始日期</label>
                        <input type="date" id="repStart" class="form-control form-control-sm">
                    </div>
                    <div class="mb-3">
                        <label class="small text-muted mb-1">结束日期</label>
                        <input type="date" id="repEnd" class="form-control form-control-sm">
                    </div>
                    <button class="btn btn-primary btn-sm w-100" onclick="generateReport()">重新刷新周报</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="editModal" class="modal-overlay">
    <div class="bg-white p-4 shadow-lg" style="width: 500px; border-radius: 20px;">
        <h5 class="fw-bold mb-4" id="modalTitle">需求详情</h5>
        <input type="hidden" id="fId">
        
        <div class="row mb-3">
            <div class="col-6">
                <label class="small fw-bold">提出需求时间</label>
                <input type="date" id="fCreateAt" class="form-control" readonly style="background:#f1f3f9">
            </div>
            <div class="col-6">
                <label class="small fw-bold">所属系统</label>
                <input type="text" id="fSystem" class="form-control" placeholder="系统名称">
            </div>
        </div>

        <div class="mb-3">
            <label class="small fw-bold">需求描述</label>
            <textarea id="fDesc" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label class="small fw-bold">负责人</label>
            <input type="text" id="fOwner" class="form-control">
        </div>

        <div class="row mb-4">
            <div class="col-6">
                <label class="small fw-bold">计划完成日期</label>
                <input type="date" id="fPlanTime" class="form-control">
            </div>
            <div class="col-6">
                <label class="small fw-bold">状态</label>
                <select id="fStatus" class="form-select">
                    <option value="进行中">进行中</option>
                    <option value="已完成">已完成</option>
                    <option value="已取消">已取消</option>
                </select>
            </div>
        </div>

        <div class="d-flex gap-2 justify-content-end">
            <button class="btn btn-light rounded-pill px-4" onclick="closeModal()">取消</button>
            <button class="btn btn-primary rounded-pill px-4" onclick="handleSave()">保存</button>
        </div>
    </div>
</div>

<script>
    // 配置
    const SB_URL = 'https://gcetwdskijgnegzvsxta.supabase.co';
    const SB_KEY = 'sb_publishable_4GJMrHSttX2bjshdvPIWNQ_xmMDl2mD';
    const client = supabase.createClient(SB_URL, SB_KEY);
    
    let rawData = [];
    let filteredData = [];
    let currentFilter = 'all';
    let currentPage = 1;
    const pageSize = 10;

    window.onload = () => {
        loadData();
        initReportDates();
    };

    async function loadData() {
        const { data, error } = await client.from('requirements').select('*').order('created_at', { ascending: false });
        if (!error) {
            rawData = data;
            applyFilters();
            updateStats();
        }
    }

    // 格式化日期：处理截图中的 ISO 字符串
    function formatDate(str) {
        if (!str) return '-';
        try {
            const date = new Date(str);
            if (isNaN(date.getTime())) return '-';
            return date.toISOString().split('T')[0];
        } catch (e) { return '-'; }
    }

    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const now = new Date().setHours(0,0,0,0);

        filteredData = rawData.filter(item => {
            const isDone = item.status === '已完成';
            const planD = item.plan_time ? new Date(item.plan_time).setHours(0,0,0,0) : null;
            const isDelayed = !isDone && planD && planD < now;
            
            let passType = true;
            if(currentFilter === 'ongoing') passType = (item.status === '进行中');
            if(currentFilter === 'delayed') passType = isDelayed;
            if(currentFilter === 'today') {
                const today = new Date();
                const weekEnd = new Date(today.setDate(today.getDate() + (7-today.getDay()))).setHours(23,59,59);
                passType = !isDone && planD && planD <= weekEnd;
            }

            const passSearch = (item.description || '').toLowerCase().includes(search) || 
                               (item.system || '').toLowerCase().includes(search) || 
                               (item.owner || '').toLowerCase().includes(search);

            return passType && passSearch;
        });
        render();
    }

    function render() {
        const total = filteredData.length;
        const maxPage = Math.ceil(total / pageSize) || 1;
        const start = (currentPage - 1) * pageSize;
        const pageData = filteredData.slice(start, start + pageSize);
        const now = new Date().setHours(0,0,0,0);

        document.getElementById('dataTable').innerHTML = pageData.map((item, index) => {
            let badgeClass = 'status-doing';
            let statusText = item.status || '进行中';
            const pTime = item.plan_time ? new Date(item.plan_time).setHours(0,0,0,0) : null;

            if (item.status === '已完成') badgeClass = 'status-done';
            else if (pTime && pTime < now) { badgeClass = 'status-delay'; statusText = '已延期'; }

            return `<tr>
                <td class="small text-muted">${start + index + 1}</td>
                <td><span class="badge bg-light text-primary border">${item.system || '其他'}</span></td>
                <td style="max-width:300px" class="text-truncate" title="${item.description}">${item.description}</td>
                <td class="small">${item.owner || '-'}</td>
                <td><span class="status-badge ${badgeClass}">${statusText}</span></td>
                <td class="small">${formatDate(item.plan_time)}</td>
                <td>
                    <button class="btn btn-sm text-primary p-0 me-2" onclick="openModal(${item.id})">编辑</button>
                    <button class="btn btn-sm text-danger p-0" onclick="handleDel(${item.id})">删除</button>
                </td>
            </tr>`;
        }).join('') || '<tr><td colspan="7" class="text-center py-4 text-muted">暂无数据</td></tr>';

        document.getElementById('totalNum').innerText = total;
        document.getElementById('pageNum').innerText = `${currentPage}/${maxPage}`;
    }

    // AI解析：增加错误引导
    async function handleAIParse() {
        const text = document.getElementById('aiInput').value;
        if (!text) return showToast("请先输入内容");

        const btn = document.getElementById('aiBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 解析中...';
        btn.disabled = true;

        try {
            // 如果是在本地 file:// 运行，尝试捕获跨域错误
            const { data, error } = await client.functions.invoke('parse-requirement', { body: { text } });
            
            if (error) {
                if (window.location.protocol === 'file:') {
                    throw new Error("跨域策略限制。请使用本地服务器打开（如 Live Server）或直接在浏览器测试");
                }
                throw error;
            }

            openModal();
            if (data.system) document.getElementById('fSystem').value = data.system;
            if (data.description) document.getElementById('fDesc').value = data.description;
            if (data.owner) document.getElementById('fOwner').value = data.owner;
            if (data.plan_time) document.getElementById('fPlanTime').value = formatDate(data.plan_time);
            
            showToast("AI 解析完成，已填充");
            document.getElementById('aiInput').value = '';
        } catch (e) {
            console.error(e);
            alert("AI 解析报错：" + e.message + "\n\n建议：请确保您是通过 http:// 地址访问，而非双击文件打开。");
        } finally {
            btn.innerHTML = 'AI 解析';
            btn.disabled = false;
        }
    }

    async function handleSave() {
        const id = document.getElementById('fId').value;
        const payload = {
            system: document.getElementById('fSystem').value,
            description: document.getElementById('fDesc').value,
            owner: document.getElementById('fOwner').value,
            plan_time: document.getElementById('fPlanTime').value || null,
            status: document.getElementById('fStatus').value
        };

        if(!payload.description) return showToast("请描述需求内容");

        const { error } = id ? 
            await client.from('requirements').update(payload).eq('id', id) : 
            await client.from('requirements').insert([payload]);

        if(!error) { showToast("保存成功"); closeModal(); loadData(); }
        else showToast("错误：" + error.message);
    }

    function generateReport() {
        const start = document.getElementById('repStart').value;
        const end = document.getElementById('repEnd').value;
        const now = new Date().setHours(0,0,0,0);

        let groups = {};
        rawData.forEach(i => {
            const sys = i.system || '待定系统';
            if(!groups[sys]) groups[sys] = [];
            groups[sys].push(i);
        });

        let txt = `【项目周报】(${start} 至 ${end})\n\n`;
        txt += `一、总体概览\n目前待处理需求 ${rawData.filter(x=>x.status!=='已完成').length} 项，本周已完成 ${rawData.filter(x=>x.status==='已完成').length} 项。\n\n`;
        txt += `二、详细进度\n`;
        
        Object.keys(groups).forEach((sys, idx) => {
            txt += `${idx+1}. ${sys}:\n`;
            groups[sys].forEach(item => {
                txt += `   - [${item.status}] ${item.description} (${item.owner || '无'})\n`;
            });
        });
        
        txt += `\n三、风险预警\n`;
        const delays = rawData.filter(i => i.status !== '已完成' && i.plan_time && new Date(i.plan_time) < now);
        txt += delays.length > 0 ? `当前存在 ${delays.length} 项延期，请关注：\n` + delays.map(d=>` - ${d.description}`).join('\n') : "目前无进度风险。";

        document.getElementById('weeklyReportPreview').innerText = txt;
    }

    // 辅助函数
    function setFilter(f) { currentFilter = f; currentPage = 1; applyFilters(); }
    function changePage(d) { currentPage += d; if(currentPage < 1) currentPage = 1; render(); }
    function openModal(id = null) {
        document.getElementById('fId').value = id || '';
        document.getElementById('modalTitle').innerText = id ? '编辑需求' : '新增需求';
        const item = id ? rawData.find(x => x.id === id) : null;
        
        document.getElementById('fCreateAt').value = formatDate(item ? item.created_at : new Date());
        document.getElementById('fSystem').value = item ? (item.system || '') : '';
        document.getElementById('fDesc').value = item ? (item.description || '') : '';
        document.getElementById('fOwner').value = item ? (item.owner || '') : '';
        document.getElementById('fPlanTime').value = item ? formatDate(item.plan_time) : '';
        document.getElementById('fStatus').value = item ? (item.status || '进行中') : '进行中';
        
        document.getElementById('editModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('editModal').style.display = 'none'; }
    function showToast(m) { 
        const t = document.getElementById('toast'); 
        t.innerText = m; t.style.display = 'block'; 
        setTimeout(() => t.style.display = 'none', 3000); 
    }
    async function handleDel(id) { if(confirm('确定删除?')) { await client.from('requirements').delete().eq('id', id); loadData(); } }
    function switchTab(t) {
        document.getElementById('view-kanban').style.display = t==='kanban'?'block':'none';
        document.getElementById('view-report').style.display = t==='report'?'block':'none';
        document.getElementById('nav-kanban').classList.toggle('active', t==='kanban');
        document.getElementById('nav-report').classList.toggle('active', t==='report');
        if(t==='report') generateReport();
    }
    function initReportDates() {
        const now = new Date();
        const start = new Date(now.setDate(now.getDate() - now.getDay() + 1));
        const end = new Date(now.setDate(now.getDate() + 6));
        document.getElementById('repStart').value = start.toISOString().split('T')[0];
        document.getElementById('repEnd').value = end.toISOString().split('T')[0];
    }
    function updateStats() {
        const now = new Date().setHours(0,0,0,0);
        document.getElementById('statTotal').innerText = rawData.length;
        document.getElementById('statDoing').innerText = rawData.filter(i => i.status === '进行中').length;
        document.getElementById('statDelay').innerText = rawData.filter(i => i.status !== '已完成' && i.plan_time && new Date(i.plan_time) < now).length;
        const today = new Date();
        const weekEnd = new Date(today.setDate(today.getDate() + (7-today.getDay()))).setHours(23,59,59);
        document.getElementById('statToday').innerText = rawData.filter(i => i.status !== '已完成' && i.plan_time && new Date(i.plan_time).getTime() <= weekEnd).length;
    }
    function exportToExcel() {
        const data = rawData.map(i => ({ "系统": i.system, "描述": i.description, "负责人": i.owner, "状态": i.status, "计划时间": formatDate(i.plan_time) }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "需求");
        XLSX.writeFile(wb, "需求导出.xlsx");
    }
    async function copyReport() {
        await navigator.clipboard.writeText(document.getElementById('weeklyReportPreview').innerText);
        showToast("周报已复制");
    }
</script>
</body>
</html>
