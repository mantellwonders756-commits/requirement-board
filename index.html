<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求看板 Pro - 完整功能恢复版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* 核心视觉回归：恢复用户喜爱的紫色渐变色系 */
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'PingFang SC', sans-serif; color: #334155; }
        .navbar { background: white; border-bottom: 1px solid #edf2f7; padding: 0.8rem 0; position: sticky; top: 0; z-index: 1000; }
        
        /* 导航样式恢复 */
        .nav-tabs { border: none; }
        .nav-tabs .nav-link { border: none; color: #64748b; font-weight: 500; padding: 8px 20px; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .nav-tabs .nav-link.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2); }

        /* 统计色块回归：紫色渐变 */
        .stat-card { border: none; border-radius: 16px; padding: 20px; color: white; cursor: pointer; transition: all 0.3s ease; height: 120px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 8px 15px rgba(0,0,0,0.08); }
        .stat-card:hover { transform: translateY(-3px); }
        .bg-total { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .bg-ongoing { background: linear-gradient(135deg, #a855f7, #ec4899); }
        .bg-delayed { background: linear-gradient(135deg, #f43f5e, #fb7185); }
        .bg-weekly { background: linear-gradient(135deg, #3b82f6, #2dd4bf); }

        .card-custom { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 25px; background: white; margin-bottom: 20px; }
        
        /* 列表标签样式 */
        .status-tag { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .tag-done { background: #ecfdf5; color: #059669; }
        .tag-doing { background: #eff6ff; color: #2563eb; }
        .tag-delay { background: #fff1f2; color: #e11d48; }

        /* 弹窗与提示 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
        .toast-msg { position: fixed; top: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 25px; border-radius: 8px; display: none; z-index: 3000; }
        
        #aiInput { border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; width: 100%; min-height: 100px; outline: none; transition: 0.3s; }
        #aiInput:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }

        /* 周报预览区恢复 */
        #weeklyReportPreview { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 25px; white-space: pre-wrap; font-size: 14px; line-height: 1.8; color: #1e293b; max-height: 600px; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="toast" class="toast-msg"></div>

    <nav class="navbar">
        <div class="container d-flex justify-content-between">
            <div class="fw-bold fs-5 text-primary"><i class="bi bi-rocket-takeoff-fill me-2"></i>需求看板 Pro</div>
            <ul class="nav nav-tabs" id="mainTabs">
                <li class="nav-item"><a class="nav-link active" id="tab-kanban" onclick="switchTab('kanban')">需求看板</a></li>
                <li class="nav-item"><a class="nav-link" id="tab-report" onclick="switchTab('report')">项目周报</a></li>
            </ul>
        </div>
    </nav>

    <div class="container py-4">
        <div id="kanbanView">
            <div class="card-custom">
                <h6 class="fw-bold mb-3"><i class="bi bi-lightning-charge-fill text-warning me-2"></i>智能快速录入</h6>
                <textarea id="aiInput" placeholder="例如：下周五前张三需要完成资产系统导出功能，需要同步财务接口..."></textarea>
                <div class="d-flex justify-content-end gap-2 mt-3">
                    <button class="btn btn-light btn-sm rounded-pill px-3 border" onclick="document.getElementById('aiInput').value=''">清空内容</button>
                    <button class="btn btn-primary btn-sm rounded-pill px-4" id="aiBtn" onclick="handleAIParse()">AI 智能解析</button>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-3" onclick="setFilter('all')">
                    <div class="stat-card bg-total">
                        <h2 class="fw-bold m-0" id="statTotal">0</h2>
                        <div class="small opacity-75">总需求清单</div>
                    </div>
                </div>
                <div class="col-md-3" onclick="setFilter('ongoing')">
                    <div class="stat-card bg-ongoing">
                        <h2 class="fw-bold m-0" id="statDoing">0</h2>
                        <div class="small opacity-75">进行中事项</div>
                    </div>
                </div>
                <div class="col-md-3" onclick="setFilter('delayed')">
                    <div class="stat-card bg-delayed">
                        <h2 class="fw-bold m-0" id="statDelay">0</h2>
                        <div class="small opacity-75">已延期预警</div>
                    </div>
                </div>
                <div class="col-md-3" onclick="setFilter('today')">
                    <div class="stat-card bg-weekly">
                        <h2 class="fw-bold m-0" id="statToday">0</h2>
                        <div class="small opacity-75">本周待办任务</div>
                    </div>
                </div>
            </div>

            <div class="card-custom">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary btn-sm rounded-pill px-3" onclick="openAddModal()"><i class="bi bi-plus-lg me-1"></i>新增需求</button>
                        <button class="btn btn-outline-success btn-sm rounded-pill px-3" onclick="exportToExcel()"><i class="bi bi-file-earmark-excel me-1"></i>导出表格</button>
                    </div>
                    <div class="w-25 position-relative">
                        <i class="bi bi-search position-absolute" style="left:12px; top:7px; color:#94a3b8;"></i>
                        <input type="text" id="filterInput" class="form-control form-control-sm ps-5 rounded-pill" placeholder="搜索系统、负责人..." oninput="currentPage=1;applyAllFilters()">
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th width="60">序号</th>
                                <th width="120">系统</th>
                                <th>需求描述</th>
                                <th width="120">负责人</th>
                                <th width="100">状态</th>
                                <th width="150">计划时间</th>
                                <th width="120">操作</th>
                            </tr>
                        </thead>
                        <tbody id="reqTable"></tbody>
                    </table>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <div class="small text-muted">共 <span id="totalCount">0</span> 条记录</div>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-secondary" onclick="changePage(-1)"><i class="bi bi-chevron-left"></i></button>
                        <button class="btn btn-outline-secondary" id="pageInfo">1/1</button>
                        <button class="btn btn-outline-secondary" onclick="changePage(1)"><i class="bi bi-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div id="reportView" style="display: none;">
            <div class="row">
                <div class="col-md-8">
                    <div class="card-custom">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="fw-bold m-0">项目周报预览</h6>
                            <button class="btn btn-primary btn-sm rounded-pill px-3" onclick="copyReport()"><i class="bi bi-clipboard me-1"></i>复制全文</button>
                        </div>
                        <div id="weeklyReportPreview">正在加载统计数据...</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card-custom">
                        <h6 class="fw-bold mb-3">周报参数设置</h6>
                        <div class="mb-3">
                            <label class="small text-muted mb-1">开始日期</label>
                            <input type="date" id="reportStart" class="form-control form-control-sm">
                        </div>
                        <div class="mb-3">
                            <label class="small text-muted mb-1">结束日期</label>
                            <input type="date" id="reportEnd" class="form-control form-control-sm">
                        </div>
                        <button class="btn btn-soft-primary btn-sm w-100 border" onclick="generateReport()">重新刷新周报内容</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="card p-4 shadow-lg border-0" style="width: 550px; border-radius: 20px;">
            <h5 id="modalTitle" class="fw-bold mb-4">需求详情</h5>
            <input type="hidden" id="fieldId">
            <div class="row mb-3">
                <div class="col-6">
                    <label class="small fw-bold">提出时间</label>
                    <input type="date" id="fCreateTime" class="form-control" readonly style="background:#f1f5f9">
                </div>
                <div class="col-6">
                    <label class="small fw-bold">所属系统</label>
                    <input type="text" id="fSystem" class="form-control" placeholder="输入系统名称">
                </div>
            </div>
            <div class="mb-3">
                <label class="small fw-bold">需求描述</label>
                <textarea id="fDesc" class="form-control" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label class="small fw-bold">负责人</label>
                <input type="text" id="fOwner" class="form-control">
            </div>
            <div class="row mb-4">
                <div class="col-6">
                    <label class="small fw-bold">计划完成时间</label>
                    <input type="date" id="fTime" class="form-control">
                </div>
                <div class="col-6">
                    <label class="small fw-bold">状态</label>
                    <select id="fStatus" class="form-select">
                        <option value="进行中">进行中</option>
                        <option value="已完成">已完成</option>
                        <option value="已取消">已取消</option>
                    </select>
                </div>
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-light rounded-pill px-4" onclick="closeModal()">取消</button>
                <button class="btn btn-primary rounded-pill px-4" onclick="handleSave()">保存需求</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gcetwdskijgnegzvsxta.supabase.co';
        const SB_KEY = 'sb_publishable_4GJMrHSttX2bjshdvPIWNQ_xmMDl2mD';
        const client = supabase.createClient(SB_URL, SB_KEY);
        
        let dataStore = [];
        let filteredData = [];
        let currentStatusFilter = 'all';
        let currentPage = 1;
        const pageSize = 10;

        window.onload = () => { loadData(); initDates(); };

        async function loadData() {
            const { data, error } = await client.from('requirements').select('*').order('created_at', { ascending: false });
            if (!error) {
                dataStore = data;
                applyAllFilters();
                updateStats();
            }
        }

        // 统一日期显示格式
        function formatDate(d) {
            if (!d) return '-';
            const date = new Date(d);
            return isNaN(date.getTime()) ? '-' : date.toISOString().split('T')[0];
        }

        // AI 解析核心加固
        async function handleAIParse() {
            const text = document.getElementById('aiInput').value;
            if(!text) return showToast("请输入需要解析的内容");
            
            const btn = document.getElementById('aiBtn');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 解析中...';
            btn.disabled = true;
            
            try {
                // 使用 headers 强制绕过部分 CORS 预检限制
                const { data, error } = await client.functions.invoke('parse-requirement', { 
                    body: { text },
                    headers: { "Content-Type": "application/json" }
                });
                if(error) throw error;
                
                openAddModal();
                if (data.system) document.getElementById('fSystem').value = data.system;
                if (data.description) document.getElementById('fDesc').value = data.description;
                if (data.owner) document.getElementById('fOwner').value = data.owner;
                if (data.plan_time) document.getElementById('fTime').value = formatDate(data.plan_time);
                showToast("解析成功！");
            } catch (e) {
                console.error(e);
                alert("AI 解析遇到跨域或网络限制，请确保在 http 环境下运行，或手动输入。错误信息：" + e.message);
            } finally {
                btn.innerHTML = 'AI 智能解析';
                btn.disabled = false;
            }
        }

        function applyAllFilters() {
            const keyword = document.getElementById('filterInput').value.toLowerCase();
            const now = new Date().setHours(0,0,0,0);
            filteredData = dataStore.filter(item => {
                const isDone = item.status === '已完成';
                const pDate = item.plan_time ? new Date(item.plan_time).setHours(0,0,0,0) : null;
                const isDelay = !isDone && pDate && pDate < now;
                
                let passStat = true;
                if(currentStatusFilter === 'ongoing') passStat = (item.status === '进行中');
                if(currentStatusFilter === 'delayed') passStat = isDelay;
                if(currentStatusFilter === 'today') {
                    const today = new Date();
                    const weekEnd = new Date(today.setDate(today.getDate() + (7-today.getDay()))).setHours(23,59,59);
                    passStat = !isDone && pDate && pDate <= weekEnd;
                }
                const passKeyword = (item.description || '').toLowerCase().includes(keyword) || 
                                    (item.system || '').toLowerCase().includes(keyword) || 
                                    (item.owner || '').toLowerCase().includes(keyword);
                return passStat && passKeyword;
            });
            render();
        }

        function render() {
            const start = (currentPage - 1) * pageSize;
            const pageData = filteredData.slice(start, start + pageSize);
            const now = new Date().setHours(0,0,0,0);
            
            document.getElementById('reqTable').innerHTML = pageData.map((item, index) => {
                const pDate = item.plan_time ? new Date(item.plan_time).setHours(0,0,0,0) : null;
                let statusClass = 'tag-doing';
                let displayStatus = item.status || '进行中';
                if(item.status === '已完成') statusClass = 'tag-done';
                else if(pDate && pDate < now) { statusClass = 'tag-delay'; displayStatus = '已延期'; }

                return `<tr>
                    <td>${start + index + 1}</td>
                    <td><span class="badge bg-light text-primary border">${item.system || '未分类'}</span></td>
                    <td class="text-truncate" style="max-width:300px">${item.description}</td>
                    <td>${item.owner || '-'}</td>
                    <td><span class="status-tag ${statusClass}">${displayStatus}</span></td>
                    <td>${formatDate(item.plan_time)}</td>
                    <td>
                        <button class="btn btn-sm text-primary p-0 me-2" onclick="openEdit(${item.id})">编辑</button>
                        <button class="btn btn-sm text-danger p-0" onclick="handleDel(${item.id})">删除</button>
                    </td>
                </tr>`;
            }).join('') || '<tr><td colspan="7" class="text-center py-4">暂无匹配需求</td></tr>';
            
            document.getElementById('totalCount').innerText = filteredData.length;
            document.getElementById('pageInfo').innerText = `${currentPage}/${Math.ceil(filteredData.length/pageSize) || 1}`;
        }

        function updateStats() {
            const now = new Date().setHours(0,0,0,0);
            const today = new Date();
            const weekEnd = new Date(today.setDate(today.getDate() + (7-today.getDay()))).setHours(23,59,59);
            document.getElementById('statTotal').innerText = dataStore.length;
            document.getElementById('statDoing').innerText = dataStore.filter(i => i.status === '进行中').length;
            document.getElementById('statDelay').innerText = dataStore.filter(i => i.status !== '已完成' && i.plan_time && new Date(i.plan_time).setHours(0,0,0,0) < now).length;
            document.getElementById('statToday').innerText = dataStore.filter(i => i.status !== '已完成' && i.plan_time && new Date(i.plan_time).getTime() <= weekEnd).length;
        }

        // 核心功能：恢复完整的周报逻辑
        function generateReport() {
            const start = document.getElementById('reportStart').value;
            const end = document.getElementById('reportEnd').value;
            const now = new Date().setHours(0,0,0,0);
            let groups = {};
            dataStore.forEach(i => {
                const sys = i.system || '待归类系统';
                if(!groups[sys]) groups[sys] = [];
                groups[sys].push(i);
            });

            let txt = `【项目进度周报】周期：${start} ~ ${end}\n\n`;
            txt += `一、整体进度概览\n目前共有需求 ${dataStore.length} 项，本周已完成 ${dataStore.filter(i=>i.status==='已完成').length} 项，${dataStore.filter(i=>i.status==='进行中').length} 项正在推进中。\n\n`;
            txt += `二、系统明细清单\n`;
            Object.keys(groups).forEach((sys, idx) => {
                txt += `${idx+1}. ${sys}：\n`;
                groups[sys].forEach(item => {
                    txt += `   - [${item.status}] ${item.description}（负责人：${item.owner || '待定'}）\n`;
                });
            });
            const delays = dataStore.filter(i=>i.status!=='已完成' && i.plan_time && new Date(i.plan_time)<now);
            txt += `\n三、异常与风险预警\n${delays.length > 0 ? `当前存在 ${delays.length} 项延期，请关注：\n` + delays.map(d=>` - ${d.description}`).join('\n') : '当前暂无进度风险。'}`;
            document.getElementById('weeklyReportPreview').innerText = txt;
        }

        function switchTab(t) {
            document.getElementById('kanbanView').style.display = t==='kanban'?'block':'none';
            document.getElementById('reportView').style.display = t==='report'?'block':'none';
            document.getElementById('tab-kanban').classList.toggle('active', t==='kanban');
            document.getElementById('tab-report').classList.toggle('active', t==='report');
            if(t==='report') generateReport();
        }

        function openAddModal() {
            document.getElementById('fieldId').value = '';
            document.getElementById('modalTitle').innerText = '新增需求';
            document.getElementById('fCreateTime').value = new Date().toISOString().split('T')[0];
            document.getElementById('fSystem').value = '';
            document.getElementById('fDesc').value = '';
            document.getElementById('fOwner').value = '';
            document.getElementById('fTime').value = '';
            document.getElementById('fStatus').value = '进行中';
            document.getElementById('editModal').style.display = 'flex';
        }

        function openEdit(id) {
            const i = dataStore.find(x => x.id === id);
            document.getElementById('fieldId').value = i.id;
            document.getElementById('modalTitle').innerText = '编辑需求';
            document.getElementById('fCreateTime').value = formatDate(i.created_at);
            document.getElementById('fSystem').value = i.system || '';
            document.getElementById('fDesc').value = i.description || '';
            document.getElementById('fOwner').value = i.owner || '';
            document.getElementById('fTime').value = formatDate(i.plan_time);
            document.getElementById('fStatus').value = i.status || '进行中';
            document.getElementById('editModal').style.display = 'flex';
        }

        async function handleSave() {
            const id = document.getElementById('fieldId').value;
            const payload = {
                system: document.getElementById('fSystem').value,
                description: document.getElementById('fDesc').value,
                owner: document.getElementById('fOwner').value,
                plan_time: document.getElementById('fTime').value || null,
                status: document.getElementById('fStatus').value
            };
            const { error } = id ? await client.from('requirements').update(payload).eq('id', id) : await client.from('requirements').insert([payload]);
            if(!error) { showToast("保存成功"); closeModal(); loadData(); }
        }

        function changePage(d) { currentPage += d; if(currentPage < 1) currentPage = 1; render(); }
        function setFilter(f) { currentStatusFilter = f; currentPage = 1; applyAllFilters(); }
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 2000); }
        async function handleDel(id) { if(confirm('确定彻底删除吗？')) { await client.from('requirements').delete().eq('id', id); loadData(); } }
        async function copyReport() { await navigator.clipboard.writeText(document.getElementById('weeklyReportPreview').innerText); showToast("已复制到剪贴板"); }
        function initDates() {
            const now = new Date();
            const start = new Date(now.setDate(now.getDate() - now.getDay() + 1));
            const end = new Date(now.setDate(now.getDate() + 6));
            document.getElementById('reportStart').value = start.toISOString().split('T')[0];
            document.getElementById('reportEnd').value = end.toISOString().split('T')[0];
        }
        function exportToExcel() {
            const data = dataStore.map(i => ({ "系统": i.system, "需求描述": i.description, "负责人": i.owner, "状态": i.status, "计划日期": formatDate(i.plan_time) }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "需求清单");
            XLSX.writeFile(wb, `需求看板_${new Date().toLocaleDateString()}.xlsx`);
        }
    </script>
</body>
</html>
