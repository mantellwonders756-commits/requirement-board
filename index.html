<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能需求看板与提醒系统 - 团队协同版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #334155; }
        .navbar { background: white; border-bottom: 1px solid #edf2f7; padding: 1rem 0; }
        .quick-input-card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 25px; background: white; margin-top: 25px; }
        .ai-title { font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .ai-textarea { border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; font-size: 14px; background: #fcfcfc; }
        .stat-card { border: none; border-radius: 16px; padding: 20px; color: white; position: relative; overflow: hidden; height: 120px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .stat-card h3 { font-size: 32px; font-weight: 700; margin-bottom: 0; }
        .bg-purple { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .bg-pink { background: linear-gradient(135deg, #f472b6, #db2777); }
        .bg-orange { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
        .bg-cyan { background: linear-gradient(135deg, #06b6d4, #22d3ee); }
        .table-card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 25px; background: white; margin-top: 25px; }
        .table thead th { background: #f8fafc; color: #64748b; font-weight: 600; font-size: 13px; border: none; padding: 15px; }
        .table tbody td { padding: 15px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        .status-tag { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; }
        .tag-ongoing { background: #ecfdf5; color: #10b981; }
        .tag-warning { background: #fff7ed; color: #ea580c; }
        .tag-delayed { background: #fff1f2; color: #f43f5e; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
        .toast-msg { position: fixed; top: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 25px; border-radius: 8px; display: none; z-index: 3000; }
    </style>
</head>
<body>
    <div id="toast" class="toast-msg"></div>

    <nav class="navbar">
        <div class="container d-flex justify-content-between">
            <div class="fw-bold fs-5 text-primary"><i class="bi bi-intersect me-2"></i>智能需求看板与提醒系统</div>
            <div class="small text-muted">2026年4月9日 | 团队协同版</div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="quick-input-card">
            <div class="ai-title"><i class="bi bi-lightning-fill text-warning"></i>智能快速录入</div>
            <textarea id="aiInput" class="form-control ai-textarea" rows="3" placeholder="例如：张三在4月20日前完成OA系统升级..."></textarea>
            <div class="d-flex gap-2 mt-3">
                <button class="btn btn-primary rounded-pill px-4" onclick="handleAIParse()"><i class="bi bi-robot me-2"></i>AI 解析</button>
            </div>
        </div>

        <div class="row g-4 mt-1">
            <div class="col-md-3"><div class="stat-card bg-purple"><h3 id="statToday">0</h3><div class="label">今日到期</div></div></div>
            <div class="col-md-3"><div class="stat-card bg-pink"><h3 id="statOngoing">0</h3><div class="label">进行中</div></div></div>
            <div class="col-md-3"><div class="stat-card bg-orange"><h3 id="statOverdue">0</h3><div class="label">已延期</div></div></div>
            <div class="col-md-3"><div class="stat-card bg-cyan"><h3 id="statTotal">0</h3><div class="label">总需求数</div></div></div>
        </div>

        <div class="table-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <button class="btn btn-primary btn-sm px-3" onclick="openAddModal()"><i class="bi bi-plus-lg me-1"></i>新增需求</button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>序号</th><th>系统</th><th>需求描述</th><th>处理人邮箱</th><th>状态</th><th>计划完成</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="reqTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="remindModal" class="modal-overlay">
        <div class="card p-4 shadow" style="width: 90%; max-width: 450px; border-radius: 20px; border:none;">
            <h5 class="fw-bold mb-3"><i class="bi bi-send-fill text-primary me-2"></i>发送邮件提醒</h5>
            <div class="mb-3">
                <label class="small fw-bold text-muted">需求描述</label>
                <div id="rDesc" class="p-2 bg-light rounded small mt-1"></div>
            </div>
            <div class="mb-3">
                <label class="small fw-bold text-muted">接收邮箱</label>
                <input type="email" id="rEmail" class="form-control mt-1" placeholder="请输入处理人邮箱">
            </div>
            <div class="mb-4">
                <label class="small fw-bold text-muted">计划完成时间</label>
                <div id="rTime" class="p-2 bg-light rounded small mt-1"></div>
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-light px-4" onclick="closeRemindModal()">取消</button>
                <button id="sendBtn" class="btn btn-primary px-4" onclick="executeSendEmail()">发送提醒</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="card p-4 shadow" style="width: 90%; max-width: 500px; border-radius: 20px; border:none;">
            <h5 id="modalTitle" class="fw-bold mb-4">编辑需求信息</h5>
            <input type="hidden" id="fieldId">
            <div class="mb-3"><label class="small fw-bold">所属系统</label><input type="text" id="fSystem" class="form-control"></div>
            <div class="mb-3"><label class="small fw-bold">需求描述</label><textarea id="fDesc" class="form-control" rows="3"></textarea></div>
            <div class="mb-3"><label class="small fw-bold">处理人邮箱</label><input type="email" id="fOwner" class="form-control" placeholder="name@company.com"></div>
            <div class="mb-4"><label class="small fw-bold">计划完成时间</label><input type="datetime-local" id="fTime" class="form-control"></div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-light px-4" onclick="closeModal()">取消</button>
                <button class="btn btn-primary px-4" onclick="handleSave()">确认保存</button>
            </div>
        </div>
    </div>

    <script>
        // 配置你的 Supabase 信息
        const SB_URL = 'https://gcetwdskijgnegzvsxta.supabase.co';
        const SB_KEY = 'sb_publishable_4GJMrHSttX2bjshdvPIWNQ_xmMDl2mD';
        const client = supabase.createClient(SB_URL, SB_KEY);
        let dataStore = [];

        window.onload = loadData;

        async function loadData() {
            const { data, error } = await client.from('requirements').select('*').order('created_at', { ascending: false });
            if (!error) { dataStore = data; render(data); updateStats(); }
        }

        function render(data) {
            const html = data.map((item, index) => {
                const now = new Date();
                const planDate = new Date(item.plan_time);
                const diffDays = Math.ceil((planDate - now) / (1000 * 60 * 60 * 24));
                let tagClass = 'tag-ongoing';
                if(diffDays < 0) tagClass = 'tag-delayed';
                else if(diffDays <= 7) tagClass = 'tag-warning';

                return `<tr>
                    <td class="text-muted small">${index + 1}</td>
                    <td><span class="badge bg-light text-primary border px-2 py-1">${item.system || '通用'}</span></td>
                    <td class="text-truncate" style="max-width:200px" title="${item.description}">${item.description}</td>
                    <td class="small">${item.owner || '-'}</td>
                    <td><span class="status-tag ${tagClass}">● ${diffDays < 0 ? '已延期' : '进行中'}</span></td>
                    <td class="small">${new Date(item.plan_time).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-sm text-primary p-0 me-2" onclick="openEdit(${item.id})">编辑</button>
                        <button class="btn btn-sm text-warning p-0 me-2" onclick="openRemindModal(${item.id})"><i class="bi bi-bell-fill"></i>提醒</button>
                        <button class="btn btn-sm text-danger p-0" onclick="handleDel(${item.id})">删除</button>
                    </td>
                </tr>`;
            }).join('');
            document.getElementById('reqTable').innerHTML = html || '<tr><td colspan="7" class="text-center py-5">暂无记录</td></tr>';
        }

        // --- 邮件提醒逻辑 (已对接 Edge Function) ---
        let currentRemindItem = null;

        function openRemindModal(id) {
            currentRemindItem = dataStore.find(i => i.id === id);
            document.getElementById('rDesc').innerText = currentRemindItem.description;
            document.getElementById('rEmail').value = currentRemindItem.owner || '';
            document.getElementById('rTime').innerText = new Date(currentRemindItem.plan_time).toLocaleString();
            document.getElementById('remindModal').style.display = 'flex';
        }

        function closeRemindModal() { document.getElementById('remindModal').style.display = 'none'; }

        async function executeSendEmail() {
            const email = document.getElementById('rEmail').value;
            if(!email || !email.includes('@')) {
                alert("请输入有效的邮箱地址");
                return;
            }

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerText = "正在发送...";

            try {
                // 正式调用云端部署的 send-email 函数
                const { data, error } = await client.functions.invoke('send-email', {
                    body: { 
                        to: email, 
                        description: currentRemindItem.description, 
                        plan_time: new Date(currentRemindItem.plan_time).toLocaleString()
                    }
                });

                if (error) throw error;

                showToast("✅ 邮件提醒已成功送达！");
                closeRemindModal();
            } catch (err) {
                console.error('发送失败:', err);
                showToast("❌ 发送失败，请检查 Resend 配置");
            } finally {
                btn.disabled = false;
                btn.innerText = "发送提醒";
            }
        }

        // --- 数据操作逻辑 ---
        async function handleSave() {
            const id = document.getElementById('fieldId').value;
            const payload = {
                system: document.getElementById('fSystem').value,
                description: document.getElementById('fDesc').value,
                owner: document.getElementById('fOwner').value,
                plan_time: document.getElementById('fTime').value
            };
            const { error } = id ? await client.from('requirements').update(payload).eq('id', id) : await client.from('requirements').insert([payload]);
            if(!error) { showToast("保存成功"); closeModal(); loadData(); }
        }

        async function handleDel(id) {
            if(confirm('确定要删除这条需求吗？')) {
                const { error } = await client.from('requirements').delete().eq('id', id);
                if(!error) { showToast("删除成功"); loadData(); }
            }
        }

        function handleAIParse() {
            const input = document.getElementById('aiInput').value;
            if(!input) return;
            showToast("AI 解析中...");
            setTimeout(() => {
                document.getElementById('fSystem').value = "解析系统";
                document.getElementById('fDesc').value = input;
                document.getElementById('fTime').value = new Date(Date.now() + 7*24*3600*1000).toISOString().slice(0,16);
                document.getElementById('editModal').style.display = 'flex';
                showToast("解析完成，请完善信息");
            }, 800);
        }

        function openEdit(id) {
            const item = dataStore.find(i => i.id === id);
            document.getElementById('fieldId').value = item.id;
            document.getElementById('fSystem').value = item.system || '';
            document.getElementById('fDesc').value = item.description;
            document.getElementById('fOwner').value = item.owner || '';
            if(item.plan_time) document.getElementById('fTime').value = new Date(item.plan_time).toISOString().slice(0,16);
            document.getElementById('editModal').style.display = 'flex';
        }

        function openAddModal() {
            document.getElementById('fieldId').value = '';
            document.getElementById('fSystem').value = ''; document.getElementById('fDesc').value = '';
            document.getElementById('fOwner').value = ''; document.getElementById('fTime').value = '';
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); }
        
        function updateStats() {
            const now = new Date();
            document.getElementById('statTotal').innerText = dataStore.length;
            document.getElementById('statOngoing').innerText = dataStore.filter(i => new Date(i.plan_time) >= now).length;
            document.getElementById('statOverdue').innerText = dataStore.filter(i => new Date(i.plan_time) < now).length;
            document.getElementById('statToday').innerText = dataStore.filter(i => new Date(i.plan_time).toDateString() === now.toDateString()).length;
        }
    </script>
</body>
</html>
