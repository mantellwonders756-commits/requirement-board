<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能需求管理与周报系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #334155; }
        .navbar { background: white; border-bottom: 1px solid #edf2f7; padding: 1rem 0; sticky-top: true; }
        
        /* 导航菜单样式 */
        .nav-tabs { border: none; margin-bottom: 20px; }
        .nav-tabs .nav-link { border: none; color: #64748b; font-weight: 500; padding: 10px 20px; border-radius: 10px; transition: 0.3s; }
        .nav-tabs .nav-link.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        .quick-input-card, .table-card, .report-card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 25px; background: white; margin-bottom: 25px; }
        .ai-title { font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .ai-textarea { border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; font-size: 14px; background: #fcfcfc; }
        
        .stat-card { border: none; border-radius: 16px; padding: 20px; color: white; cursor: pointer; transition: all 0.3s ease; height: 110px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .stat-card:hover { transform: translateY(-5px); }
        .bg-purple { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .bg-pink { background: linear-gradient(135deg, #f472b6, #db2777); }
        .bg-orange { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
        .bg-cyan { background: linear-gradient(135deg, #06b6d4, #22d3ee); }

        .status-tag { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; }
        .tag-ongoing { background: #ecfdf5; color: #10b981; }
        .tag-delayed { background: #fff1f2; color: #f43f5e; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
        .toast-msg { position: fixed; top: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 25px; border-radius: 8px; display: none; z-index: 3000; }
        
        /* 周报预览样式 */
        #weeklyReportPreview { background: #f1f5f9; border-radius: 12px; padding: 20px; white-space: pre-wrap; font-family: 'Courier New', Courier, monospace; font-size: 14px; line-height: 1.6; color: #1e293b; max-height: 600px; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="toast" class="toast-msg"></div>

    <nav class="navbar">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="fw-bold fs-5 text-primary"><i class="bi bi-intersect me-2"></i>智能需求管理系统</div>
            <ul class="nav nav-tabs m-0" id="mainTabs">
                <li class="nav-item">
                    <a class="nav-link active" href="javascript:void(0)" onclick="switchTab('kanban')"><i class="bi bi-kanban me-2"></i>需求看板</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="javascript:void(0)" onclick="switchTab('report')"><i class="bi bi-file-earmark-medical me-2"></i>项目周报</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container pb-5">
        <div id="kanbanView">
            <div class="quick-input-card mt-4">
                <div class="ai-title"><i class="bi bi-lightning-fill text-warning"></i>智能快速录入</div>
                <textarea id="aiInput" class="form-control ai-textarea" rows="2" placeholder="格式：系统名 描述 处理人邮箱 计划时间..."></textarea>
                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-primary rounded-pill px-4" onclick="handleAIParse()"><i class="bi bi-robot me-2"></i>AI 解析</button>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-3" onclick="setFilter('today')"><div class="stat-card bg-purple"><h3><span id="statToday">0</span></h3><div class="small">今日到期</div></div></div>
                <div class="col-md-3" onclick="setFilter('ongoing')"><div class="stat-card bg-pink"><h3><span id="statOngoing">0</span></h3><div class="small">进行中</div></div></div>
                <div class="col-md-3" onclick="setFilter('delayed')"><div class="stat-card bg-orange"><h3><span id="statOverdue">0</span></h3><div class="small">已延期</div></div></div>
                <div class="col-md-3" onclick="setFilter('all')"><div class="stat-card bg-cyan"><h3><span id="statTotal">0</span></h3><div class="small">总需求数</div></div></div>
            </div>

            <div class="table-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="d-flex gap-2">
                        <button class="btn btn-success btn-sm px-3" onclick="exportToExcel()"><i class="bi bi-file-earmark-excel me-1"></i>导出 Excel</button>
                        <button class="btn btn-primary btn-sm px-3" onclick="openAddModal()"><i class="bi bi-plus-lg me-1"></i>新增需求</button>
                    </div>
                    <div class="search-box position-relative">
                        <i class="bi bi-search position-absolute" style="left:12px; top:8px; color:#94a3b8;"></i>
                        <input type="text" id="filterInput" class="form-control ps-5 rounded-pill" placeholder="搜索..." oninput="applyAllFilters()">
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>序号</th><th>系统</th><th>需求描述</th><th>负责人</th><th>状态</th><th>提出时间</th><th>计划完成</th><th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="reqTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="reportView" style="display: none;" class="mt-4">
            <div class="row">
                <div class="col-md-8">
                    <div class="report-card">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold m-0"><i class="bi bi-eye me-2 text-primary"></i>周报内容预览</h5>
                            <button class="btn btn-primary btn-sm rounded-pill" onclick="copyReport()">
                                <i class="bi bi-clipboard me-1"></i> 复制周报文本
                            </button>
                        </div>
                        <div id="weeklyReportPreview">正在生成周报内容...</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="report-card">
                        <h5 class="fw-bold mb-3"><i class="bi bi-gear me-2 text-primary"></i>周报设置</h5>
                        <div class="mb-3">
                            <label class="small fw-bold mb-1">汇报周期</label>
                            <div class="d-flex gap-2">
                                <input type="date" id="reportStart" class="form-control form-control-sm">
                                <span class="align-self-center">-</span>
                                <input type="date" id="reportEnd" class="form-control form-control-sm">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold mb-1">汇报标题</label>
                            <input type="text" id="reportTitle" class="form-control form-control-sm" value="闪批及其他系统需求进展周报">
                        </div>
                        <button class="btn btn-outline-primary btn-sm w-100" onclick="generateReport()">重新生成预览</button>
                        <hr>
                        <div class="p-3 bg-light rounded-3">
                            <p class="small text-muted mb-0"><i class="bi bi-info-circle me-1"></i>系统会自动按所属系统归类需求，并根据“已延期”状态自动填入风险项。</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="card p-4 shadow border-0" style="width: 90%; max-width: 500px; border-radius: 20px;">
            <h5 id="modalTitle" class="fw-bold mb-4">需求信息</h5>
            <input type="hidden" id="fieldId">
            <div class="mb-3"><label class="small fw-bold">所属系统</label><input type="text" id="fSystem" class="form-control" placeholder="例如：资产系统"></div>
            <div class="mb-3"><label class="small fw-bold">需求描述</label><textarea id="fDesc" class="form-control" rows="3"></textarea></div>
            <div class="mb-3"><label class="small fw-bold">负责人邮箱</label><input type="email" id="fOwner" class="form-control"></div>
            <div class="row">
                <div class="col-6 mb-3"><label class="small fw-bold">提出时间</label><input type="date" id="fCreateTime" class="form-control"></div>
                <div class="col-6 mb-3"><label class="small fw-bold">计划完成</label><input type="date" id="fTime" class="form-control"></div>
            </div>
            <div class="d-flex gap-2 justify-content-end mt-3">
                <button class="btn btn-light" onclick="closeModal()">取消</button>
                <button class="btn btn-primary px-4" onclick="handleSave()">确认保存</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gcetwdskijgnegzvsxta.supabase.co';
        const SB_KEY = 'sb_publishable_4GJMrHSttX2bjshdvPIWNQ_xmMDl2mD';
        const client = supabase.createClient(SB_URL, SB_KEY);
        
        let dataStore = [];
        let currentStatusFilter = 'all';

        window.onload = () => {
            loadData();
            initReportDates();
        };

        async function loadData() {
            const { data, error } = await client.from('requirements').select('*').order('created_at', { ascending: false });
            if (!error) {
                dataStore = data;
                applyAllFilters();
                updateStats();
                generateReport();
            }
        }

        // 菜单切换
        function switchTab(tab) {
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            if(tab === 'kanban') {
                document.getElementById('kanbanView').style.display = 'block';
                document.getElementById('reportView').style.display = 'none';
                event.target.classList.add('active');
            } else {
                document.getElementById('kanbanView').style.display = 'none';
                document.getElementById('reportView').style.display = 'block';
                document.querySelectorAll('.nav-link')[1].classList.add('active');
                generateReport();
            }
        }

        function formatDate(dateStr) {
            if(!dateStr) return '-';
            const d = new Date(dateStr);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        // 周报生成逻辑
        function initReportDates() {
            const now = new Date();
            const day = now.getDay() || 7;
            const monday = new Date(now.setDate(now.getDate() - day + 1));
            const sunday = new Date(now.setDate(now.getDate() + 6));
            document.getElementById('reportStart').value = formatDate(monday);
            document.getElementById('reportEnd').value = formatDate(sunday);
        }

        function generateReport() {
            const title = document.getElementById('reportTitle').value;
            const start = document.getElementById('reportStart').value;
            const end = document.getElementById('reportEnd').value;
            const now = new Date();
            now.setHours(0,0,0,0);

            // 1. 按系统分组
            const groups = {};
            dataStore.forEach(item => {
                const sys = item.system || '其他系统';
                if(!groups[sys]) groups[sys] = [];
                groups[sys].push(item);
            });

            let reportText = `【${title}（${start} - ${end}）】\n\n大家好：\n\n本周继续同步系统需求整体进展。现将本周情况汇报如下：\n\n一、 各系统需求当前状态与进展\n\n`;

            // 2. 填充各系统进展
            Object.keys(groups).forEach((sys, index) => {
                const items = groups[sys];
                const total = items.length;
                const ongoing = items.filter(i => new Date(i.plan_time) >= now).length;
                const delayed = items.filter(i => new Date(i.plan_time) < now).length;

                reportText += `${index + 1}. ${sys}\n`;
                reportText += `需求（${total}项）：${ongoing}项进行中；${delayed > 0 ? delayed + '项已延期' : '暂无延期'}。\n\n`;
            });

            // 3. 风险识别
            const riskItems = dataStore.filter(i => new Date(i.plan_time) < now);
            reportText += `二、 当前主要情况与风险\n\n`;
            if(riskItems.length > 0) {
                reportText += `1. 进度延迟：当前共有 ${riskItems.length} 项需求发生延期，主要涉及 ${[...new Set(riskItems.map(i => i.system))].join('、')} 系统。\n`;
                reportText += `2. 风险同步：建议协调开发资源，优先处理延期项：${riskItems.slice(0,2).map(i => i.description).join('; ')}等。\n\n`;
            } else {
                reportText += `1. 整体进展：目前各系统需求按序推进，状态稳定，暂无重大风险。\n\n`;
            }

            reportText += `三、 后续计划与协调事项\n\n1. 持续跟进剩余需求的排期与实施。\n2. 各需求的具体详情，请参见看板系统。\n\n以上为本周工作进展，请各位审阅。如有问题，请随时反馈。\n\n谢谢！`;

            document.getElementById('weeklyReportPreview').innerText = reportText;
        }

        async function copyReport() {
            const text = document.getElementById('weeklyReportPreview').innerText;
            await navigator.clipboard.writeText(text);
            showToast("周报内容已复制到剪贴板！");
        }

        // 看板原有逻辑保持...
        function setFilter(status) {
            currentStatusFilter = status;
            applyAllFilters();
        }

        function applyAllFilters() {
            const keyword = document.getElementById('filterInput').value.toLowerCase();
            const now = new Date();
            now.setHours(0,0,0,0);

            const filtered = dataStore.filter(item => {
                const pDate = new Date(item.plan_time);
                pDate.setHours(0,0,0,0);
                const isOverdue = pDate < now;
                
                let passStatus = (currentStatusFilter === 'all') || 
                                 (currentStatusFilter === 'delayed' && isOverdue) || 
                                 (currentStatusFilter === 'ongoing' && !isOverdue) ||
                                 (currentStatusFilter === 'today' && pDate.getTime() === now.getTime());

                return passStatus && (item.description.toLowerCase().includes(keyword) || (item.system || '').toLowerCase().includes(keyword));
            });
            render(filtered);
        }

        function render(data) {
            const now = new Date(); now.setHours(0,0,0,0);
            document.getElementById('reqTable').innerHTML = data.map((item, index) => {
                const pDate = new Date(item.plan_time); pDate.setHours(0,0,0,0);
                const isOverdue = pDate < now;
                return `<tr>
                    <td class="text-muted small">${index+1}</td>
                    <td><span class="badge bg-light text-primary border">${item.system || '通用'}</span></td>
                    <td class="text-truncate" style="max-width:200px">${item.description}</td>
                    <td class="small">${item.owner || '-'}</td>
                    <td><span class="status-tag ${isOverdue?'tag-delayed':'tag-ongoing'}">● ${isOverdue?'已延期':'进行中'}</span></td>
                    <td class="small">${formatDate(item.created_at)}</td>
                    <td class="small fw-bold">${formatDate(item.plan_time)}</td>
                    <td>
                        <button class="btn btn-sm text-primary p-0 me-2" onclick="openEdit(${item.id})">编辑</button>
                        <button class="btn btn-sm text-danger p-0" onclick="handleDel(${item.id})">删除</button>
                    </td>
                </tr>`;
            }).join('') || '<tr><td colspan="8" class="text-center py-4">暂无数据</td></tr>';
        }

        function updateStats() {
            const now = new Date(); now.setHours(0,0,0,0);
            document.getElementById('statTotal').innerText = dataStore.length;
            document.getElementById('statOngoing').innerText = dataStore.filter(i => new Date(i.plan_time) >= now).length;
            document.getElementById('statOverdue').innerText = dataStore.filter(i => new Date(i.plan_time) < now).length;
            document.getElementById('statToday').innerText = dataStore.filter(i => new Date(i.plan_time).toDateString() === now.toDateString()).length;
        }

        function openAddModal() {
            document.getElementById('fieldId').value = '';
            document.getElementById('fSystem').value = '';
            document.getElementById('fDesc').value = '';
            document.getElementById('fCreateTime').value = formatDate(new Date());
            document.getElementById('fTime').value = '';
            document.getElementById('editModal').style.display = 'flex';
        }

        function openEdit(id) {
            const i = dataStore.find(x => x.id === id);
            document.getElementById('fieldId').value = i.id;
            document.getElementById('fSystem').value = i.system || '';
            document.getElementById('fDesc').value = i.description;
            document.getElementById('fOwner').value = i.owner || '';
            document.getElementById('fCreateTime').value = formatDate(i.created_at);
            document.getElementById('fTime').value = formatDate(i.plan_time);
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }

        async function handleSave() {
            const id = document.getElementById('fieldId').value;
            const payload = {
                system: document.getElementById('fSystem').value,
                description: document.getElementById('fDesc').value,
                owner: document.getElementById('fOwner').value,
                created_at: document.getElementById('fCreateTime').value,
                plan_time: document.getElementById('fTime').value
            };
            const { error } = id ? await client.from('requirements').update(payload).eq('id', id) : await client.from('requirements').insert([payload]);
            if(!error) { showToast("保存成功"); closeModal(); loadData(); }
        }

        async function handleDel(id) {
            if(confirm('确认删除？')) {
                await client.from('requirements').delete().eq('id', id);
                loadData();
            }
        }

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); }
        function handleAIParse() { showToast("AI 解析服务配置中..."); }
    </script>
</body>
</html>
